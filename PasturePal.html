                <div style={{ height:1,background:season.accent+"30",marginBottom:14 }} />
                {error
                  ? <div style={{ fontFamily:F.body,fontSize:13,color:C.amber }}>{error}</div>
                  : <div style={{ fontFamily:F.body,fontSize:14,color:C.brown,lineHeight:1.85,whiteSpace:"pre-wrap" }}>{digest}</div>

    // ── Garden: Add Plant Modal ───────────────────────────────────────
    function AddPlantModal({ onSave, onClose }) {
      const [selected, setSelected] = useState(null);
      const [customName, setCustomName] = useState("");
      const [planted, setPlanted]   = useState(new Date().toISOString().slice(0,10));
      const [bed, setBed]           = useState("");
      const [notes, setNotes]       = useState("");
      const [filter, setFilter]     = useState("All");

      const types = ["All", "Vegetable", "Fruit", "Herb", "Flower", "Other"];
      const shown = COMMON_PLANTS.filter(p => filter === "All" || p.type === filter);
      const plant = selected;

      function handleSave() {
        if (!plant) return;
        const name = (plant.name === "Custom Plant" && customName) ? customName : plant.name;
        const harvestDate = planted ? new Date(new Date(planted).getTime() + plant.daysToHarvest * 86400000).toISOString().slice(0,10) : null;
        onSave({
          id: uid(),
          name,
          emoji: plant.emoji,
          type: plant.type,
          color: plant.color,
          daysToHarvest: plant.daysToHarvest,
          planted,
          harvestDate,
          bed,
          notes,
          status: "Seedling",
          statusEmoji: "🌱",
        });
      }

      return (
        <Modal title="Add to Garden" onClose={onClose} wide>
          {/* Type filter */}
          <div style={{ display:"flex", gap:6, marginBottom:14, flexWrap:"wrap" }}>
            {types.map(t => (
              <button key={t} onClick={() => setFilter(t)} style={{ padding:"4px 12px", borderRadius:100, border:`1.5px solid ${filter===t ? C.sage : C.parchment}`, background: filter===t ? C.sage : "transparent", color: filter===t ? C.white : C.stone, fontFamily:F.body, fontSize:11, fontWeight:600, cursor:"pointer" }}>{t}</button>
            ))}
          </div>

          {/* Plant grid */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:8, marginBottom:18, maxHeight:200, overflowY:"auto" }}>
            {shown.map(p => (
              <button key={p.name} onClick={() => setSelected(p)} style={{ padding:"10px 6px", borderRadius:12, border:`2px solid ${selected?.name===p.name ? p.color : C.parchment}`, background: selected?.name===p.name ? p.color+"18" : C.white, cursor:"pointer", textAlign:"center", transition:"all 0.15s" }}>
                <div style={{ fontSize:22, marginBottom:3 }}>{p.emoji}</div>
                <div style={{ fontFamily:F.body, fontSize:10, fontWeight:selected?.name===p.name ? 700 : 500, color: selected?.name===p.name ? p.color : C.stone, lineHeight:1.2 }}>{p.name}</div>
              </button>
            ))}
          </div>

          {selected && (
            <div className="pp-animate">
              <Divider label={`${selected.emoji} ${selected.name}`} />
              {selected.name === "Custom Plant" && (
                <Input label="Plant Name" value={customName} onChange={setCustomName} placeholder="e.g. Cherokee Purple Tomato" />
              )}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div>
                  <FieldLabel>Date Planted</FieldLabel>
                  <input type="date" value={planted} onChange={e => setPlanted(e.target.value)} style={{ width:"100%", padding:"10px 14px", borderRadius:10, border:`1.5px solid ${C.parchment}`, fontFamily:F.body, fontSize:14, background:C.white, color:C.dark }} />
                </div>
                <Input label="Garden Bed / Location" value={bed} onChange={setBed} placeholder="e.g. Raised Bed 2" />
              </div>
              <Input label="Notes (optional)" value={notes} onChange={setNotes} placeholder="Variety, spacing, etc." rows={2} />
              <div style={{ background:C.sagePale, borderRadius:12, padding:"10px 14px", marginBottom:14 }}>
                <div style={{ fontFamily:F.body, fontSize:12, color:C.sageDark }}>
                  🗓️ Expected harvest in <strong>{selected.daysToHarvest} days</strong>
                  {planted && <span> — around <strong>{new Date(new Date(planted).getTime() + selected.daysToHarvest*86400000).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</strong></span>}
                </div>
              </div>
              <Btn full variant="sage" onClick={handleSave}>🌱 Add to Garden</Btn>
            </div>
          )}
        </Modal>
      );
    }

    // ── Garden: Plant Card ────────────────────────────────────────────
    function PlantCard({ plant, onUpdate, onDelete }) {
      const [expanded, setExpanded] = useState(false);
      const progress = getPlantProgress(plant);
      const statusObj = PLANT_STATUSES.find(s => s.label === plant.status) || PLANT_STATUSES[0];
      const daysLeft = plant.harvestDate ? daysUntil(plant.harvestDate) : null;
      const gcUrl = plant.harvestDate ? getGardenGCalUrl(plant.name, plant.harvestDate, plant.notes) : null;

      function cycleStatus() {
        const idx = PLANT_STATUSES.findIndex(s => s.label === plant.status);
        const next = PLANT_STATUSES[(idx + 1) % PLANT_STATUSES.length];
        onUpdate({ ...plant, status: next.label, statusEmoji: next.emoji });
      }

      return (
        <Card style={{ padding:0, overflow:"hidden" }}>
          <div onClick={() => setExpanded(e => !e)} style={{ padding:"14px 16px", cursor:"pointer", display:"flex", alignItems:"center", gap:12 }}>
            {/* Color bar */}
            <div style={{ width:4, alignSelf:"stretch", borderRadius:4, background: plant.color || C.sage, flexShrink:0 }} />
            <div style={{ fontSize:28, flexShrink:0 }}>{plant.emoji}</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontFamily:F.display, fontWeight:700, fontSize:16, color:C.dark }}>{plant.name}</div>
              <div style={{ fontFamily:F.body, fontSize:11, color:C.stone }}>{plant.bed || "Garden"} · Planted {plant.planted ? fmt(plant.planted) : "—"}</div>
              {/* Progress bar */}
              <div style={{ marginTop:6, height:4, background:C.parchment, borderRadius:4, overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${progress}%`, background: statusObj.color, borderRadius:4, transition:"width 0.5s ease" }} />
              </div>
            </div>
            <div style={{ flexShrink:0, textAlign:"right" }}>
              <div style={{ background: statusObj.color + "22", color: statusObj.color, border:`1.5px solid ${statusObj.color}55`, borderRadius:100, padding:"2px 10px", fontFamily:F.body, fontSize:10, fontWeight:700, whiteSpace:"nowrap" }}>
                {statusObj.emoji} {statusObj.label}
              </div>
              {daysLeft !== null && (
                <div style={{ fontFamily:F.body, fontSize:10, color: daysLeft <= 7 ? C.terracotta : C.stone, fontWeight: daysLeft <= 7 ? 700 : 400, marginTop:4 }}>
                  {daysLeft <= 0 ? "Ready!" : `${daysLeft}d to harvest`}
                </div>
              )}
            </div>
          </div>

          {expanded && (
            <div className="pp-animate" style={{ borderTop:`1px solid ${C.parchment}`, padding:"14px 16px 16px 36px", background:C.cream+"60" }}>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
                <button onClick={cycleStatus} style={{ padding:"6px 14px", borderRadius:8, border:`1.5px solid ${statusObj.color}55`, background:statusObj.color+"18", color:statusObj.color, fontFamily:F.body, fontSize:11, fontWeight:700, cursor:"pointer" }}>
                  Mark as next status →
                </button>
                {gcUrl && (
                  <a href={gcUrl} target="_blank" rel="noopener noreferrer" style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 14px", borderRadius:8, background:"#4285F415", border:"1px solid #4285F433", color:"#4285F4", fontFamily:F.body, fontSize:11, fontWeight:600, textDecoration:"none" }}>
                    📅 Add to Calendar
                  </a>
                )}
                <button onClick={() => onDelete(plant.id)} style={{ padding:"6px 14px", borderRadius:8, border:`1.5px solid ${C.terracotta}44`, background:C.terracotta+"12", color:C.terracotta, fontFamily:F.body, fontSize:11, fontWeight:600, cursor:"pointer" }}>
                  Remove
                </button>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                <div style={{ background:C.white, borderRadius:10, padding:"10px 12px" }}>
                  <div style={{ fontFamily:F.body, fontSize:9, color:C.stone, textTransform:"uppercase", letterSpacing:"0.1em", fontWeight:700, marginBottom:3 }}>Days in Ground</div>
                  <div style={{ fontFamily:F.display, fontSize:18, fontWeight:800, color:C.dark }}>{daysInGround(plant.planted)}</div>
                </div>
                <div style={{ background:C.white, borderRadius:10, padding:"10px 12px" }}>
                  <div style={{ fontFamily:F.body, fontSize:9, color:C.stone, textTransform:"uppercase", letterSpacing:"0.1em", fontWeight:700, marginBottom:3 }}>Progress</div>
                  <div style={{ fontFamily:F.display, fontSize:18, fontWeight:800, color:C.dark }}>{progress}%</div>
                </div>
                <div style={{ background:C.white, borderRadius:10, padding:"10px 12px" }}>
                  <div style={{ fontFamily:F.body, fontSize:9, color:C.stone, textTransform:"uppercase", letterSpacing:"0.1em", fontWeight:700, marginBottom:3 }}>Est. Harvest</div>
                  <div style={{ fontFamily:F.body, fontSize:12, fontWeight:700, color:C.brown }}>{plant.harvestDate ? fmt(plant.harvestDate) : "—"}</div>
                </div>
              </div>
              {plant.notes && <div style={{ marginTop:10, fontFamily:F.body, fontSize:12, color:C.stone, fontStyle:"italic" }}>📝 {plant.notes}</div>}
            </div>
          )}
        </Card>
      );
    }

    // ── Garden: AI Chat ───────────────────────────────────────────────
    function GardenAIChat({ garden, zipCode, zone, isPro, onUpgrade }) {
      const [msgs, setMsgs]   = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const endRef = useRef(null);
      const AI_ERROR = "AI chat requires a backend proxy. When deployed on Vercel with /api/chat, the garden advisor will answer questions about your zone, frost dates, plant timing, and pest management.";

      const monthName = new Date().toLocaleString("en-US",{month:"long"});
      const climBand  = getZoneClimBand(zone);
      const frostInfo = FROST_DATES[zone?.toLowerCase()] || {};
      const plantList = garden.map(p => `${p.name} (${p.status}, planted ${p.planted||"unknown"}, ${daysInGround(p.planted)}d in ground)`).join("; ");

      const systemPrompt = `You are a knowledgeable garden advisor for a homestead app. The user's garden details:
- USDA Zone: ${zone || "unknown"} (${climBand} climate)
- Zip code: ${zipCode || "unknown"}
- Last frost: ${frostInfo.last || "unknown"}, First fall frost: ${frostInfo.first || "unknown"}
- Current month: ${monthName}
- Plants in garden: ${plantList || "none yet"}

Give practical, zone-specific gardening advice. Be warm, encouraging, and concise. Cover pest/disease management, harvest timing, companion planting, soil health, and seasonal tasks. Always tailor advice to their specific USDA zone and current month.`;

      useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs]);

      async function send() {
        if (!input.trim() || loading) return;
        if (!isPro) { onUpgrade(); return; }
        const userMsg = { role:"user", content:input.trim() };
        const newMsgs = [...msgs, userMsg];
        setMsgs(newMsgs);
        setInput("");
        setLoading(true);
        try {
          const resp = await fetch("/api/chat", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ system: systemPrompt, messages: newMsgs, maxTokens: 600 }) });
          const data = await resp.json();
          setMsgs(m => [...m, { role:"assistant", content: data.content || AI_ERROR }]);
        } catch {
          setMsgs(m => [...m, { role:"assistant", content: AI_ERROR }]);
        }
        setLoading(false);
      }

      const starters = ["What should I plant this month?","Any pest alerts for my zone?","When should I harvest my tomatoes?","How do I improve my soil?"];

      return (
        <Card style={{ background:`linear-gradient(150deg, ${C.sagePale} 0%, ${C.offWhite} 100%)` }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
            <div style={{ fontSize:28 }}>🌱</div>
            <div>
              <div style={{ fontFamily:F.display, fontWeight:800, fontSize:18, color:C.dark }}>Garden Advisor</div>
              <div style={{ fontFamily:F.body, fontSize:11, color:C.sageDark, fontWeight:600 }}>Zone {zone || "?"} · {climBand} climate</div>
            </div>
          </div>

          {!isPro && (
            <div style={{ background:C.white, borderRadius:12, padding:"14px 16px", marginBottom:14, border:`1.5px solid ${C.parchment}` }}>
              <div style={{ fontFamily:F.body, fontSize:13, color:C.brown, marginBottom:10 }}>🔒 AI Garden Advisor is a Pro feature. Get zone-specific pest alerts, harvest timing, and companion planting advice.</div>
              <Btn small variant="primary" onClick={onUpgrade}>Upgrade to Pro</Btn>
            </div>
          )}

          {/* Starter prompts */}
          {msgs.length === 0 && isPro && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
              {starters.map(s => (
                <button key={s} onClick={() => { setInput(s); }} style={{ padding:"10px 12px", borderRadius:10, border:`1.5px solid ${C.sageLight}`, background:C.white, cursor:"pointer", fontFamily:F.body, fontSize:12, color:C.sageDark, textAlign:"left", lineHeight:1.35 }}>{s}</button>
              ))}
            </div>
          )}

          {/* Messages */}
          {msgs.length > 0 && (
            <div style={{ maxHeight:300, overflowY:"auto", marginBottom:12, display:"flex", flexDirection:"column", gap:10 }}>
              {msgs.map((m,i) => (

    // ── Garden: Main Harvest View ─────────────────────────────────────

      const [zipError, setZipError]   = useState("");
      const [filter, setFilter]       = useState("All");

      const monthTask   = getMonthlyTask(zone);
      const frostInfo   = zone ? (FROST_DATES[zone.toLowerCase()] || {}) : {};

      const climBand    = getZoneClimBand(zone);
      const climLabels  = { cold:"Cold", temperate:"Temperate", warm:"Warm", hot:"Hot", tropical:"Tropical" };

      async function lookupZip(zip) {
        if (!zip || zip.length < 5) return;
        setLoadingZip(true);
        setZipError("");
        try {
          const res = await fetch(`https://phzmapi.org/${zip}.json`);
          if (!res.ok) throw new Error("Not found");
          const data = await res.json();
          const z = (data.zone || "").toLowerCase();
          if (!z) throw new Error("No zone");
          setZone(z);
          setZipCode(zip);
          // Schedule frost notification if permitted
          if (notifState === "granted" && frostInfo.first && frostInfo.first !== "none") {
            fireNotification("🍂 First Frost Approaching!", `Zone ${z}: First frost expected around ${frostInfo.first}. Bring in tender plants!`, "frost-" + zip);
          }
        } catch {
          setZipError("Zip code not found. Please try again.");
        }
        setLoadingZip(false);
      }

      function addPlant(p) {
        setGarden(g => [...g, p]);
        setShowAdd(false);
        // Harvest notification
        if (notifState === "granted" && p.harvestDate) {
          const d = daysUntil(p.harvestDate);
          if (d !== null && d > 0 && d <= 90) {
            fireNotification("🌱 " + p.name + " added to garden!", `Expected harvest in ${d} days — ${fmt(p.harvestDate)}`, "harvest-" + p.id);
          }
        }
      }

      function updatePlant(p) { setGarden(g => g.map(x => x.id === p.id ? p : x)); }

                    {loadingZip ? "…" : "Find"}

                </div>

              ))}
            </div>

          {/* Plant list */}

              <div style={{ fontFamily:F.body, fontSize:13, color:C.stone, marginBottom:16 }}>

    // ── Auth Modal ────────────────────────────────────────────────────
    function AuthModal({ onClose, onSuccess }) {
      const [tab, setTab]           = useState("signin");
      const [email, setEmail]       = useState("");
      const [password, setPassword] = useState("");
      const [loading, setLoading]   = useState(false);
      const [error, setError]       = useState("");
      const [success, setSuccess]   = useState("");

      async function handleSubmit() {
        if (!email || !password) { setError("Please enter your email and password."); return; }
        if (password.length < 6) { setError("Password must be at least 6 characters."); return; }
        setLoading(true); setError(""); setSuccess("");
        try {
          if (tab === "signup") {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            if (data.user && !data.user.email_confirmed_at) {
              setSuccess("Account created! Check your email for a confirmation link, then sign in.");
            } else {
              onSuccess && onSuccess(data.user);
              onClose();
            }
          } else {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            onSuccess && onSuccess(data.user);
            onClose();
          }
        } catch(e) {
          const msg = e?.message || String(e) || "Something went wrong. Please try again.";
          const lower = msg.toLowerCase();
          setError(
            lower.includes("invalid login") || lower.includes("invalid credentials") || lower.includes("invalid email or password")
              ? "Incorrect email or password."
              : lower.includes("email not confirmed")
              ? "Please confirm your email first, or check the Forgot Password link."
              : lower.includes("user already registered")
              ? "An account with this email already exists. Try signing in instead."
              : msg
          );
        } finally {
          setLoading(false);
        }
      }

      return (
        <Modal onClose={onClose}>
          <div style={{ textAlign:"center", marginBottom:20 }}>
            <div style={{ fontSize:36, marginBottom:8 }}>🏡</div>
            <h3 style={{ fontFamily:F.display, fontSize:22, fontWeight:800, color:C.dark, marginBottom:4 }}>
              {tab === "signin" ? "Welcome back" : "Create account"}
            </h3>
            <p style={{ fontFamily:F.body, fontSize:13, color:C.stone }}>
              {tab === "signin" ? "Sign in to sync your data across devices." : "Save your data to the cloud — access from any device."}
            </p>
          </div>

          {/* Tab toggle */}
          <div style={{ display:"flex", background:C.cream, borderRadius:10, padding:3, marginBottom:20, gap:3 }}>
            {[["signin","Sign In"],["signup","Create Account"]].map(([v,l])=>(
              <button key={v} onClick={()=>{setTab(v);setError("");setSuccess("");}} style={{ flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:F.body,fontSize:13,fontWeight:tab===v?700:500,background:tab===v?C.white:"transparent",color:tab===v?C.dark:C.stone }}>
                {l}
              </button>
            ))}
          </div>

          <div style={{ marginBottom:12 }}>
            <label style={{ fontFamily:F.body,fontSize:11,color:C.stone,fontWeight:600,display:"block",marginBottom:4 }}>EMAIL</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()} autoComplete="email" style={{ width:"100%",padding:"10px 14px",borderRadius:9,border:`1.5px solid ${C.parchment}`,fontFamily:F.body,fontSize:14,background:C.white,outline:"none" }} placeholder="you@example.com" />
          </div>
          <div style={{ marginBottom:20 }}>
            <label style={{ fontFamily:F.body,fontSize:11,color:C.stone,fontWeight:600,display:"block",marginBottom:4 }}>PASSWORD</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()} autoComplete={tab==="signin"?"current-password":"new-password"} style={{ width:"100%",padding:"10px 14px",borderRadius:9,border:`1.5px solid ${C.parchment}`,fontFamily:F.body,fontSize:14,background:C.white,outline:"none" }} placeholder="••••••••" />
            {tab==="signup" && <div style={{ fontFamily:F.body,fontSize:11,color:C.stone,marginTop:4 }}>At least 6 characters</div>}
          </div>

          {error   && <div style={{ background:"rgba(184,92,52,0.1)",border:`1px solid ${C.terracotta}44`,borderRadius:9,padding:"10px 14px",marginBottom:14,fontFamily:F.body,fontSize:13,color:C.terracotta }}>{error}</div>}
          {success && <div style={{ background:C.sagePale,border:`1px solid ${C.sageLight}`,borderRadius:9,padding:"10px 14px",marginBottom:14,fontFamily:F.body,fontSize:13,color:C.sageDark }}>{success}</div>}

          <div style={{ display:"flex",gap:10 }}>
            <Btn variant="ghost" full onClick={onClose}>Cancel</Btn>
            <Btn variant="primary" full disabled={loading} onClick={handleSubmit}>
              {loading ? "Please wait…" : tab==="signin" ? "Sign In" : "Create Account"}

          </div>

          {tab==="signin" && (
            <div style={{ textAlign:"center",marginTop:14 }}>
              <button onClick={async()=>{ if(!email){setError("Enter your email first.");return;} setLoading(true); const {error}=await supabase.auth.resetPasswordForEmail(email,{redirectTo:window.location.href}); setLoading(false); if(error)setError(error.message); else setSuccess("Password reset email sent!"); }} style={{ background:"none",border:"none",cursor:"pointer",fontFamily:F.body,fontSize:12,color:C.stone,textDecoration:"underline" }}>
                Forgot password?
              </button>
            </div>
          )}
        </Modal>
      );
    }

    // ── Weather Widget ─────────────────────────────────────────────────
    function WeatherWidget({ zipCode }) {
      const [wx, setWx]           = useState(null);
      const [loading, setLoading] = useState(false);
      const cacheKey = `pp_wx_${zipCode}`;

      useEffect(() => {
        if (!zipCode || zipCode.length < 5) return;
        const cached = (() => { try { const c = localStorage.getItem(cacheKey); if (c) { const p = JSON.parse(c); if (Date.now() - p.ts < 3600000) return p.data; } } catch {} return null; })();
        if (cached) { setWx(cached); return; }
        setLoading(true);
        (async () => {
          try {
            const geo = await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${zipCode}&countrycodes=US&format=json&limit=1`).then(r=>r.json());
            if (!geo?.[0]) return;
            const {lat,lon} = geo[0];
            const data = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&temperature_unit=fahrenheit&precipitation_unit=inch&timezone=auto&forecast_days=5`).then(r=>r.json());
            localStorage.setItem(cacheKey, JSON.stringify({ ts:Date.now(), data:data.daily }));
            setWx(data.daily);
          } catch {}
          setLoading(false);
        })();
      }, [zipCode]);

      if (!zipCode || zipCode.length < 5 || loading || !wx) return null;

      const todayStr = new Date().toISOString().split("T")[0];
      const days = wx.time.slice(0,5).map((d,i) => ({
        date:d, max:Math.round(wx.temperature_2m_max[i]),
        min:Math.round(wx.temperature_2m_min[i]),
        precip:wx.precipitation_sum[i], code:wx.weathercode[i],
      }));
      const frostDays  = days.filter(d => d.min <= 32);
      const heavyRain  = days.filter(d => d.precip > 0.5);
      const dayLabel   = d => { const date=new Date(d+"T12:00:00"); const diff=Math.round((date-new Date(todayStr+"T12:00:00"))/86400000); if(diff===0)return"Today"; if(diff===1)return"Tmrw"; return date.toLocaleDateString("en-US",{weekday:"short"}); };

      return (
        <Card style={{ marginBottom:16, background:`linear-gradient(135deg,#EAF0FA 0%,${C.offWhite} 100%)`, border:"1.5px solid #C8D8E8" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
            <div style={{ fontFamily:F.display, fontWeight:800, fontSize:15, color:C.dark }}>🌤️ 5-Day Forecast</div>
            <div style={{ fontFamily:F.body, fontSize:10, color:C.stone, textTransform:"uppercase", letterSpacing:"0.08em" }}>ZIP {zipCode}</div>
          </div>
          {frostDays.length > 0 && (
            <div style={{ background:"#EBF4FF", border:"1.5px solid #A8C8E8", borderRadius:9, padding:"8px 12px", marginBottom:8, fontFamily:F.body, fontSize:12, color:"#2E6098" }}>
              ❄️ <b>Frost warning</b> — lows ≤32°F on {frostDays.map(d=>dayLabel(d.date)).join(", ")}. Protect plants & check water.
            </div>
          )}
          {heavyRain.length > 0 && (
            <div style={{ background:"#F0F8EE", border:"1.5px solid #A8C8A0", borderRadius:9, padding:"8px 12px", marginBottom:8, fontFamily:F.body, fontSize:12, color:"#2E6030" }}>
              🌧️ <b>Heavy rain</b> expected {heavyRain.map(d=>dayLabel(d.date)).join(", ")}. Check drainage & shelter.
            </div>
          )}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:5 }}>
            {days.map((d,i) => {
              const w=WX_CODE(d.code), frost=d.min<=32;
              return (
                <div key={i} style={{ textAlign:"center", background:frost?"#EBF4FF":C.white, borderRadius:9, padding:"8px 3px", border:`1.5px solid ${frost?"#A8C8E8":C.parchment}` }}>
                  <div style={{ fontFamily:F.body, fontSize:10, color:C.stone, fontWeight:600, marginBottom:3 }}>{dayLabel(d.date)}</div>
                  <div style={{ fontSize:18, marginBottom:3 }}>{w.icon}</div>
                  <div style={{ fontFamily:F.body, fontSize:11, fontWeight:700, color:C.dark }}>{d.max}°</div>
                  <div style={{ fontFamily:F.body, fontSize:10, color:frost?"#2E6098":C.stone }}>{d.min}°{frost?"❄️":""}</div>
                  {d.precip>0.1 && <div style={{ fontFamily:F.body, fontSize:9, color:C.sky, marginTop:1 }}>💧{d.precip.toFixed(1)}"</div>}
                </div>
              );
            })}
          </div>
        </Card>
      );
    }

    // ── Root ──────────────────────────────────────────────────────────
    function PasturePal() {
      const [animals, setAnimals] = useState(() => {
        try {
          const saved = localStorage.getItem("pp_animals");
          return saved ? JSON.parse(saved) : [];
        } catch { return []; }
      });
      const [view, setView]                 = useState("herd");
      const [selected, setSelected]         = useState(null);
      const [showAdd, setShowAdd]           = useState(false);
      const [showUpgrade, setShowUpgrade]   = useState(false);
      const [showReminder, setShowReminder]         = useState(null);
      const [showGestation, setShowGestation]       = useState(false);
      const [showSymptomCheck, setShowSymptomCheck] = useState(false);
      const [showDigest, setShowDigest]             = useState(false);
      const [showQuickWeight, setShowQuickWeight]   = useState(false);
      const [showAutoSchedule, setShowAutoSchedule] = useState(null); // animal object

      // Garden state
      const [garden, setGarden] = useState(() => {
        try { const s = localStorage.getItem("pp_garden"); return s ? JSON.parse(s) : []; } catch { return []; }
      });
      const [zipCode, setZipCode] = useState(() => {
        try { return localStorage.getItem("pp_zip") || ""; } catch { return ""; }
      });
      const [gardenZone, setGardenZone] = useState(() => {
        try { return localStorage.getItem("pp_zone") || ""; } catch { return ""; }
      });

      // Farm profile state
      const [farmProfile, setFarmProfile] = useState(() => {
        try { const s = localStorage.getItem("pp_farm_profile"); return s ? JSON.parse(s) : { name: "", type: "" }; } catch { return { name: "", type: "" }; }
      });

      // Farm state
      const [production, setProduction] = useState(() => {
        try { const s = localStorage.getItem("pp_prod"); return s ? JSON.parse(s) : []; } catch { return []; }
      });
      const [finances, setFinances] = useState(() => {
        try { const s = localStorage.getItem("pp_fin"); return s ? JSON.parse(s) : []; } catch { return []; }
      });
      const [pastures, setPastures] = useState(() => {
        try { const s = localStorage.getItem("pp_past"); return s ? JSON.parse(s) : []; } catch { return []; }
      });
      const [rotations, setRotations] = useState(() => {
        try { const s = localStorage.getItem("pp_rot"); return s ? JSON.parse(s) : []; } catch { return []; }
      });

      const [isPro, setIsPro]               = useState(() => {
        try { return localStorage.getItem("pp_pro") === "true"; } catch { return false; }
      });

      // Auth + sync state
      const [user, setUser]             = useState(null);
      const [showAuth, setShowAuth]       = useState(false);
      const [showInstall, setShowInstall] = useState(false);
      const [syncStatus, setSyncStatus]   = useState("idle"); // idle|pending|syncing|synced|error|offline
      const syncTimerRef                = React.useRef(null);
      const syncReadyRef                = React.useRef(false); // blocks auto-sync until initial cloud load completes

      const [notifState, setNotifState]     = useState(canNotify() ? Notification.permission : "denied");
      const [showNotifBanner, setShowNotifBanner] = useState(false);
      const FREE_LIMIT = 10;

      // Persist animals whenever they change
      useEffect(() => {
        try { localStorage.setItem("pp_animals", JSON.stringify(animals)); } catch {}
      }, [animals]);

      // Persist Pro status
      useEffect(() => {
        try { localStorage.setItem("pp_pro", String(isPro)); } catch {}
      }, [isPro]);

      // Persist garden data
      useEffect(() => { try { localStorage.setItem("pp_garden", JSON.stringify(garden)); } catch {} }, [garden]);
      useEffect(() => { try { localStorage.setItem("pp_zip", zipCode); } catch {} }, [zipCode]);
      useEffect(() => { try { localStorage.setItem("pp_zone", gardenZone); } catch {} }, [gardenZone]);

      // Persist farm profile
      useEffect(() => { try { localStorage.setItem("pp_farm_profile", JSON.stringify(farmProfile)); } catch {} }, [farmProfile]);

      // Persist farm data
      useEffect(() => { try { localStorage.setItem("pp_prod", JSON.stringify(production)); } catch {} }, [production]);
      useEffect(() => { try { localStorage.setItem("pp_fin", JSON.stringify(finances)); } catch {} }, [finances]);
      useEffect(() => { try { localStorage.setItem("pp_past", JSON.stringify(pastures)); } catch {} }, [pastures]);
      useEffect(() => { try { localStorage.setItem("pp_rot", JSON.stringify(rotations)); } catch {} }, [rotations]);

      // ── Supabase auth init ──────────────────────────────────────────
      useEffect(() => {
        if (!supabase) { syncReadyRef.current = true; return; } // no cloud — allow local saves immediately
        supabase.auth.getSession().then(({ data: { session } }) => {
          const u = session?.user ?? null;
          setUser(u);
          if (u) loadFromCloud(u.id);
          else syncReadyRef.current = true; // not logged in — allow local saves immediately
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
          const u = session?.user ?? null;
          setUser(u);
          if (u && event === "SIGNED_IN") loadFromCloud(u.id);
        });
        // Re-fetch from cloud when switching back to this tab/app — keeps
        // phone and web in sync when used on different devices.
        const handleVisibility = () => {
          if (document.visibilityState === "visible") {
            supabase.auth.getSession().then(({ data: { session } }) => {
              const u = session?.user ?? null;
              if (u) {
                const lastFetch = parseInt(localStorage.getItem("pp_last_sync") || "0");
                const staleMs = 30 * 1000; // re-fetch if last sync was > 30s ago
                if (Date.now() - lastFetch > staleMs) loadFromCloud(u.id);
              }
            });
          }
        };
        document.addEventListener("visibilitychange", handleVisibility);
        window.addEventListener("pageshow", handleVisibility); // iOS bfcache
        return () => {
          subscription.unsubscribe();
          document.removeEventListener("visibilitychange", handleVisibility);
          window.removeEventListener("pageshow", handleVisibility);
        };
      }, []);

      async function loadFromCloud(userId) {
        // Block auto-sync while we load — prevents a stale local state from
        // being upserted over valid cloud data before the fetch completes.
        syncReadyRef.current = false;
        setSyncStatus("syncing");
        try {
          const { data } = await supabase
            .from("pp_user_data")
            .select("data, updated_at")
            .eq("user_id", userId)
            .maybeSingle();
          if (data?.data) {
            // Always trust cloud data — don't compare timestamps.
            // A stale pp_last_sync on this device (e.g. phone that never
            // synced before, or cleared cache) would otherwise silently block
            // the cloud data from loading.
            const d = data.data;
            if (d.animals    !== undefined) setAnimals(d.animals);
            if (d.garden     !== undefined) setGarden(d.garden);
            if (d.zipCode    !== undefined) setZipCode(d.zipCode);
            if (d.gardenZone !== undefined) setGardenZone(d.gardenZone);
            if (d.production !== undefined) setProduction(d.production);
            if (d.finances   !== undefined) setFinances(d.finances);
            if (d.pastures   !== undefined) setPastures(d.pastures);
            if (d.rotations  !== undefined) setRotations(d.rotations);
            if (d.isPro      !== undefined) setIsPro(d.isPro);
            if (d.farmProfile !== undefined) setFarmProfile(d.farmProfile);
            localStorage.setItem("pp_last_sync", new Date(data.updated_at).getTime().toString());
          }
          setSyncStatus("synced");
        } catch {
          setSyncStatus("error");
        } finally {
          syncReadyRef.current = true;
        }
      }

      // ── Auto-sync to cloud when data changes ───────────────────────
      useEffect(() => {
        if (!supabase || !user || !syncReadyRef.current) return;
        setSyncStatus("pending");
        if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
        syncTimerRef.current = setTimeout(async () => {
          if (!navigator.onLine) { setSyncStatus("offline"); return; }
          setSyncStatus("syncing");
          try {
            await supabase.from("pp_user_data").upsert({
              user_id: user.id,
              data: { animals, garden, zipCode, gardenZone, production, finances, pastures, rotations, isPro, farmProfile },
              updated_at: new Date().toISOString(),
            }, { onConflict: "user_id" });
            localStorage.setItem("pp_last_sync", Date.now().toString());
            setSyncStatus("synced");
          } catch {
            setSyncStatus(navigator.onLine ? "error" : "offline");
          }
        }, 2500);
        return () => { if (syncTimerRef.current) clearTimeout(syncTimerRef.current); };
      }, [user, animals, garden, zipCode, gardenZone, production, finances, pastures, rotations, isPro, farmProfile]);

      // Verify Stripe subscription status on mount (checks at most every 4 hours)
      useEffect(() => {
        if (!isPro) return;
        const sessionId = localStorage.getItem("pp_stripe_session");
        if (!sessionId) return;
        const lastCheck = parseInt(localStorage.getItem("pp_sub_check") || "0");
        if (Date.now() - lastCheck < 4 * 60 * 60 * 1000) return; // skip if checked recently
        fetch("/api/verify-subscription", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId }),
        })
          .then(r => r.json())
          .then(d => {
            localStorage.setItem("pp_sub_check", Date.now().toString());
            if (!d.isActive) {
              setIsPro(false);
              localStorage.removeItem("pp_stripe_session");
              localStorage.setItem("pp_pro", "false");
            }
          })
          .catch(() => {}); // fail silently — never revoke pro on network error
      }, []);

      // Check notification banner on mount
      useEffect(() => {
        if (canNotify() && Notification.permission === "default") {
          const dismissed = localStorage.getItem("pp_notif_dismissed");
          if (!dismissed) setShowNotifBanner(true);
        }
      }, []);

      // Schedule notifications when animals change and permission is granted
      useEffect(() => {
        if (notifState === "granted") scheduleNotifications(animals);
      }, [animals, notifState]);

      const updateAnimal = a => { setAnimals(p => p.map(x => x.id === a.id ? a : x)); setSelected(a); };
      const addAnimal    = a => { setAnimals(p => [...p, a]); setShowAdd(false); setShowAutoSchedule(a); };
      const deleteAnimal = id => { setAnimals(p => p.filter(a => a.id !== id)); setSelected(null); };

      // Handle reminder saved from dashboard quick-add
      const handleReminderSave = (animalId, r) => {
        setAnimals(p => p.map(a => a.id === animalId ? { ...a, reminders: [...(a.reminders || []), r] } : a));
        setShowReminder(null);
      };

      const handleEnableNotif = async () => {
        const granted = await requestNotifPermission();
        setNotifState(granted ? "granted" : "denied");
        setShowNotifBanner(false);
        if (granted) {
          scheduleNotifications(animals);
          fireNotification("🐄 PasturePal Notifications Enabled!", "You'll now get reminders for upcoming animal tasks.");
        }
      };

      const alertCount = animals.flatMap(a => [
        ...(a.meds || []).filter(m => { const d = daysUntil(m.due); return d !== null && d <= 14 && d >= 0; }),
        ...(a.reminders || []).filter(r => { const d = daysUntil(r.due); return d !== null && d <= 7 && d >= 0; }),
      ]).length;

      return (
        <div style={{ minHeight: "100vh", background: C.cream }}>
          <style>{GLOBAL_CSS}</style>

          {/* ── Header ── */}
          <header style={{ background: C.offWhite + "FA", backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)", borderBottom: `1px solid ${C.parchment}`, position: "sticky", top: 0, zIndex: 200, padding: "0 20px", overflow: "hidden" }}>
            {/* Botanical header decoration */}
            <div style={{ position: "absolute", right: -10, top: -18, opacity: 0.1, pointerEvents: "none", transform: "rotate(15deg)" }}>
              <LeafCluster size={90} color={C.sage} />
            </div>
            <div style={{ maxWidth: 640, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 72, position: "relative" }}>
              {/* Wordmark */}
              <a onClick={() => { setView("herd"); setSelected(null); }} style={{ display: "flex", alignItems: "center", gap: 10, textDecoration: "none", cursor: "pointer" }}>
                <div style={{ width: 38, height: 38, borderRadius: 10, background: `linear-gradient(135deg, ${C.cream}, ${C.parchment})`, border: `1.5px solid ${C.parchment}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <svg width="26" height="24" viewBox="0 0 26 24" fill="none">
                    <path d="M13 1.5L0.5 8.5H25.5L13 1.5Z" fill={C.brown} opacity="0.85"/>
                    <path d="M13 1.5L0.5 8.5H25.5L13 1.5Z" stroke={C.brown} strokeWidth="1" strokeLinejoin="round"/>
                    <line x1="13" y1="1.5" x2="13" y2="4" stroke={C.midBrown} strokeWidth="1.2" strokeLinecap="round"/>
                    <rect x="2" y="8.5" width="22" height="14" rx="1" fill={C.brown} opacity="0.10"/>
                    <rect x="2" y="8.5" width="22" height="14" rx="1" stroke={C.brown} strokeWidth="1.4"/>
                    <path d="M10.5 8.5 Q13 5.5 15.5 8.5Z" fill={C.brown} opacity="0.4"/>
                    <path d="M10 22.5 L10 16.5 Q13 13.5 16 16.5 L16 22.5" stroke={C.brown} strokeWidth="1.3" fill={C.brown} fillOpacity="0.18"/>
                    <rect x="3.5" y="11.5" width="4.5" height="3.5" rx="0.5" fill={C.brown} opacity="0.25" stroke={C.brown} strokeWidth="1"/>
                    <line x1="5.75" y1="11.5" x2="5.75" y2="15" stroke={C.brown} strokeWidth="0.7" opacity="0.5"/>
                    <rect x="18" y="11.5" width="4.5" height="3.5" rx="0.5" fill={C.brown} opacity="0.25" stroke={C.brown} strokeWidth="1"/>
                    <line x1="20.25" y1="11.5" x2="20.25" y2="15" stroke={C.brown} strokeWidth="0.7" opacity="0.5"/>
                  </svg>
                </div>
                <div>
                  <div style={{ display: "flex", alignItems: "baseline", lineHeight: 1 }}>
                    <span style={{ fontFamily: F.display, fontSize: 22, color: C.dark, fontWeight: 800, letterSpacing: "-0.03em" }}>Pasture</span>
                    <span style={{ fontFamily: F.display, fontSize: 22, color: C.sage, fontWeight: 800, letterSpacing: "-0.03em" }}>Pal</span>
                  </div>
                  <div style={{ fontFamily: F.body, fontSize: 9, color: C.pebble, letterSpacing: "0.16em", textTransform: "uppercase", fontWeight: 600, marginTop: 2 }}>
                    {farmProfile?.name || "Homestead Assistant"}
                  </div>
                </div>
              </a>

              {/* Right */}
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {/* Notification bell */}
                {canNotify() && (
                  <button
                    onClick={async () => {
                      if (notifState !== "granted") {
                        await handleEnableNotif();
                      } else {
                        fireNotification("🐄 PasturePal", alertCount > 0 ? `You have ${alertCount} upcoming task${alertCount !== 1 ? "s" : ""}` : "All caught up on the homestead! 🌿");
                      }
                    }}
                    title={notifState === "granted" ? "Notifications on" : "Enable notifications"}
                    style={{ width: 36, height: 36, borderRadius: 10, background: notifState === "granted" ? C.sagePale : C.cream, border: `1.5px solid ${notifState === "granted" ? C.sageLight : C.parchment}`, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", position: "relative" }}
                  >
                    <span style={{ fontSize: 16 }}>🔔</span>
                    {alertCount > 0 && notifState === "granted" && (
                      <div style={{ position: "absolute", top: -3, right: -3, width: 16, height: 16, borderRadius: "50%", background: C.terracotta, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <span style={{ fontFamily: F.body, fontSize: 9, color: C.white, fontWeight: 700 }}>{alertCount > 9 ? "9+" : alertCount}</span>
                      </div>
                    )}
                  </button>
                )}

                {isPro
                  ? <button onClick={async () => {
                      const sid = localStorage.getItem("pp_stripe_session");
                      if (!sid) { alert("To manage your subscription, visit stripe.com or contact support."); return; }
                      try {
                        const r = await fetch("/api/create-portal-session", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ sessionId: sid }) });
                        const d = await r.json();
                        if (d.url) { localStorage.removeItem("pp_sub_check"); window.location.href = d.url; }
                        else alert("Could not open portal: " + (d.error || "Unknown error"));
                      } catch(e) { alert("Error: " + e.message); }
                    }} style={{ display: "flex", alignItems: "center", gap: 6, background: C.sagePale, border: `1.5px solid ${C.sageLight}`, borderRadius: 100, padding: "5px 12px", cursor: "pointer" }}>
                      <div style={{ width: 7, height: 7, borderRadius: "50%", background: C.sage }} />
                      <span style={{ fontFamily: F.body, fontSize: 11, color: C.sageDark, fontWeight: 700, letterSpacing: "0.06em" }}>PRO</span>
                    </button>
                  : <Btn small variant="primary" onClick={() => setShowUpgrade(true)} style={{ borderRadius: 100, padding: "7px 18px" }}>Go Pro</Btn>
                }

                {/* Sync / Auth button — only shown when Supabase is configured */}
                {supabase && (
                  user ? (
                    <div style={{ position:"relative" }}>
                      <button
                        onClick={() => {
                          if (window.confirm(`Signed in as ${user.email}\n\nSign out? Your data stays on this device.`)) {
                            supabase.auth.signOut();
                            setUser(null);
                            setSyncStatus("idle");
                          }
                        }}
                        title={`Signed in as ${user.email}${syncStatus==="synced"?" · Synced":syncStatus==="pending"?" · Saving…":syncStatus==="error"?" · Sync error":""}`}
                        style={{ width:36,height:36,borderRadius:"50%",background:C.brown,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",position:"relative" }}
                      >
                        <span style={{ fontFamily:F.display,fontSize:14,fontWeight:700,color:C.cream }}>
                          {user.email[0].toUpperCase()}
                        </span>
                        {/* Sync dot */}
                        <div style={{ position:"absolute",bottom:-1,right:-1,width:11,height:11,borderRadius:"50%",border:`2px solid ${C.offWhite}`,background:syncStatus==="synced"?C.sage:syncStatus==="syncing"||syncStatus==="pending"?C.wheat:syncStatus==="error"?C.terracotta:C.pebble }} />
                      </button>
                    </div>
                  ) : (
                    <button
                      onClick={() => setShowAuth(true)}
                      title="Sign in to sync across devices"
                      style={{ display:"flex",alignItems:"center",gap:6,background:"none",border:`1.5px solid ${C.parchment}`,borderRadius:100,padding:"6px 14px",cursor:"pointer",fontFamily:F.body,fontSize:12,fontWeight:600,color:C.brown }}
                    >
                      <span style={{ fontSize:13 }}>☁️</span> Sign In
                    </button>
                  )
                )}
              </div>
            </div>
          </header>

          {/* ── Main ── */}
          <main style={{ maxWidth: 640, margin: "0 auto", padding: "24px 20px calc(110px + env(safe-area-inset-bottom))" }}>
            {selected ? (
              <AnimalDetail animal={selected} onUpdate={updateAnimal} onBack={() => setSelected(null)} onDelete={deleteAnimal} isPro={isPro} onUpgrade={() => setShowUpgrade(true)} />
            ) : (
              <>
                {/* Notification banner */}
                {showNotifBanner && (
                  <NotificationBanner
                    onEnable={handleEnableNotif}
                    onDismiss={() => { setShowNotifBanner(false); localStorage.setItem("pp_notif_dismissed", "1"); }}
                  />
                )}

                {/* Farm identity banner */}
                <div
                  onClick={() => { if (!farmProfile.name) setView("farm"); }}
                  style={{ marginBottom: 18, borderRadius: 14, border: `1.5px solid ${farmProfile.name ? C.sageLight : C.parchment}`, background: farmProfile.name ? `linear-gradient(135deg,${C.sagePale} 0%,${C.offWhite} 100%)` : C.offWhite, padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", cursor: farmProfile.name ? "default" : "pointer" }}
                >
                  {farmProfile.name ? (
                    <>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ fontSize: 22 }}>🏡</span>
                        <div>
                          <div style={{ fontFamily: F.display, fontWeight: 800, fontSize: 15, color: C.dark, letterSpacing: "-0.01em" }}>{farmProfile.name}</div>
                          <div style={{ display: "flex", gap: 6, marginTop: 3, alignItems: "center", flexWrap: "wrap" }}>
                            {farmProfile.type && <span style={{ fontFamily: F.body, fontSize: 10, fontWeight: 700, color: C.sageDark, background: C.sageLight + "55", border: `1px solid ${C.sageLight}`, borderRadius: 100, padding: "1px 8px" }}>{farmProfile.type}</span>}
                            {zipCode && <span style={{ fontFamily: F.body, fontSize: 10, color: C.stone }}>📍 {zipCode}</span>}
                          </div>
                        </div>
                      </div>
                      <button onClick={() => setView("farm")} style={{ padding: "5px 12px", borderRadius: 8, border: `1.5px solid ${C.parchment}`, background: "transparent", color: C.stone, fontFamily: F.body, fontSize: 11, cursor: "pointer", fontWeight: 600, flexShrink: 0 }}>Edit</button>
                    </>
                  ) : (
                    <div style={{ display: "flex", alignItems: "center", gap: 10, width: "100%" }}>
                      <span style={{ fontSize: 20 }}>🏡</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontFamily: F.body, fontSize: 13, color: C.stone, fontWeight: 600 }}>Set up your farm profile</div>
                        <div style={{ fontFamily: F.body, fontSize: 11, color: C.pebble, marginTop: 1 }}>Add your farm name, type & location →</div>
                      </div>
                    </div>
                  )}
                </div>

                {/* Primary nav */}
                <div style={{ display: "flex", background: C.white, borderRadius: 12, padding: 4, marginBottom: 28, border: `1.5px solid ${C.parchment}`, gap: 4 }}>
                  {[["herd", "My Herd", "🐄"], ["garden", "Garden", "🌱"], ["farm", "Farm", "🏡"], ["ai", "AI", "🤖"]].map(([v, label, icon]) => (
                    <button key={v} onClick={() => setView(v)} className="pp-tab" style={{ flex: 1, padding: "9px 8px", borderRadius: 9, border: "none", cursor: "pointer", fontFamily: F.body, fontSize: 12, fontWeight: view === v ? 700 : 500, background: view === v ? (v === "garden" ? C.sageDark : C.brown) : "transparent", color: view === v ? C.cream : C.stone, display: "flex", alignItems: "center", justifyContent: "center", gap: 5, boxShadow: view === v ? "0 2px 8px rgba(61,43,16,0.2)" : "none" }}>
                      <span className="pp-tab-emoji">{icon}</span>
                      <span className="pp-tab-label">{icon} {label}</span>
                    </button>
                  ))}
                </div>

                {view === "herd" && (
                  <div className="pp-animate">
                    <JournalHeader
                      isPro={isPro}
                      animals={animals}
                      FREE_LIMIT={FREE_LIMIT}
                      onAdd={() => { if (!isPro && animals.length >= FREE_LIMIT) { setShowUpgrade(true); return; } setShowAdd(true); }}
                      onUpgrade={() => setShowUpgrade(true)}
                    />
                    <Dashboard animals={animals} onSelect={setSelected} onUpgrade={() => setShowUpgrade(true)} isPro={isPro} onQuickReminder={(type) => setShowReminder(type)} onGestation={() => setShowGestation(true)} onSymptomCheck={() => setShowSymptomCheck(true)} onDigest={() => setShowDigest(true)} onAdd={() => { if (!isPro && animals.length >= FREE_LIMIT) { setShowUpgrade(true); return; } setShowAdd(true); }} onQuickWeight={() => setShowQuickWeight(true)} onGoProduction={() => setView("production")} />
                  </div>
                )}

                {view === "ai" && (
                  <div className="pp-animate">
                    <div style={{ marginBottom: 24 }}>
                      <h2 style={{ fontFamily: F.display, color: C.dark, fontSize: 28, fontWeight: 800, letterSpacing: "-0.02em", marginBottom: 5 }}>AI Assistant.</h2>
                      <p style={{ fontFamily: F.body, fontSize: 11, color: C.stone, textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600 }}>Your 24/7 homestead advisor</p>
                    </div>
                    <AIChat animals={animals} isPro={isPro} onUpgrade={() => setShowUpgrade(true)} farmProfile={farmProfile} zipCode={zipCode} />
                  </div>
                )}

                {view === "garden" && (
                  <HarvestView
                    garden={garden}
                    setGarden={setGarden}
                    zipCode={zipCode}
                    setZipCode={setZipCode}
                    zone={gardenZone}
                    setZone={setGardenZone}
                    isPro={isPro}
                    onUpgrade={() => setShowUpgrade(true)}
                    notifState={notifState}
                  />
                )}

                {view === "farm" && (
                  <FarmView
                    production={production} setProduction={setProduction}
                    finances={finances}     setFinances={setFinances}
                    pastures={pastures}     setPastures={setPastures}
                    rotations={rotations}   setRotations={setRotations}
                    animals={animals}
                    zipCode={zipCode}       setZipCode={setZipCode}
                    farmProfile={farmProfile} setFarmProfile={setFarmProfile}
                  />
                )}
              </>
            )}
          </main>

          {/* ── Footer ── */}
          {!selected && (
            <footer style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: C.offWhite + "F0", backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)", borderTop: `1px solid ${C.parchment}`, padding: `10px 20px calc(14px + env(safe-area-inset-bottom))`, display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
              <HighlandCowLogo size={16} color={C.pebble} />
              <span style={{ fontFamily: F.display, fontSize: 13, color: C.pebble, fontWeight: 700 }}>Pasture<span style={{ color: C.sageLight }}>Pal</span></span>
              <span style={{ color: C.parchment, fontSize: 10 }}>·</span>
              <span style={{ fontFamily: F.body, fontSize: 10, color: C.pebble, letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 500 }}>Homestead Assistant</span>
              <span style={{ color: C.parchment, fontSize: 10 }}>·</span>
              <a href="privacy.html" style={{ fontFamily: F.body, fontSize: 10, color: C.pebble, letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 500, textDecoration: "none" }}>Privacy</a>
              <span style={{ color: C.parchment, fontSize: 10 }}>·</span>
              <a href="mailto:support@mypasturepal.com" style={{ fontFamily: F.body, fontSize: 10, color: C.pebble, letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 500, textDecoration: "none" }}>Support</a>
              <span style={{ color: C.parchment, fontSize: 10 }}>·</span>
              <button onClick={() => setShowInstall(true)} style={{ fontFamily: F.body, fontSize: 10, color: C.sage, letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 600, textDecoration: "none", background: "none", border: "none", cursor: "pointer", padding: 0 }}>📲 Add as App</button>
              <span style={{ color: C.parchment, fontSize: 10 }}>·</span>
              <a href="index.html" style={{ fontFamily: F.body, fontSize: 10, color: C.pebble, letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 500, textDecoration: "none" }}>About</a>
            </footer>
          )}

          {/* ── Offline banner ── */}
          {syncStatus === "offline" && user && supabase && (
            <div style={{ position:"fixed",top:0,left:0,right:0,zIndex:9999,background:"#3D2B10",color:"#F5EDD8",textAlign:"center",padding:"8px 16px",fontFamily:F.body,fontSize:12,fontWeight:600,letterSpacing:"0.04em" }}>
              📴 You're offline — changes saved locally and will sync when you reconnect.
            </div>
          )}

          {/* ── Modals ── */}
          {showAuth && supabase && <AuthModal onClose={() => setShowAuth(false)} onSuccess={() => {}} />}

          {showInstall && (() => {
            const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            const isAndroid = /android/i.test(navigator.userAgent);
            const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
            const Step = ({ n, title, desc }) => (
              <div style={{ display:"flex", gap:12, alignItems:"flex-start", marginBottom:14 }}>
                <div style={{ width:26, height:26, borderRadius:"50%", background:C.sage, color:"#fff", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>{n}</div>
                <div>
                  <div style={{ fontFamily:F.body, fontSize:14, fontWeight:700, color:C.dark, marginBottom:2 }}>{title}</div>
                  <div style={{ fontFamily:F.body, fontSize:13, color:C.stone, lineHeight:1.55 }}>{desc}</div>
                </div>
              </div>
            );
            return (
              <Modal title="📲 Add PasturePal as an App" onClose={() => setShowInstall(false)}>
                {isStandalone ? (
                  <div style={{ textAlign:"center", padding:"16px 0 8px" }}>
                    <div style={{ fontSize:48, marginBottom:12 }}>✅</div>
                    <div style={{ fontFamily:F.display, fontSize:18, fontWeight:700, color:C.dark, marginBottom:8 }}>Already installed!</div>
                    <div style={{ fontFamily:F.body, fontSize:14, color:C.stone, lineHeight:1.6 }}>PasturePal is running as an installed app. You're all set.</div>
                  </div>
                ) : (
                  <div>
                    <p style={{ fontFamily:F.body, fontSize:14, color:C.stone, lineHeight:1.6, marginBottom:20 }}>
                      Add PasturePal to your home screen for one-tap access — it works just like a native app, with no download required.
                    </p>

                    {/* iOS instructions — shown first on iPhone, second on Android */}
                    <div style={{ background: isAndroid ? C.cream : `${C.sage}12`, border:`1.5px solid ${isAndroid ? C.parchment : C.sage+"44"}`, borderRadius:14, padding:"16px 18px", marginBottom:14 }}>
                      <div style={{ fontFamily:F.body, fontSize:11, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", color: isAndroid ? C.pebble : C.sage, marginBottom:14 }}>
                        🍎 iPhone / iPad (Safari)
                      </div>
                      <Step n="1" title="Open in Safari" desc="Make sure you're using Safari - it won't work from Chrome or other browsers on iPhone." />
                      <Step n="2" title='Tap the Share button ⎙' desc="Find the share icon at the bottom of Safari (it looks like a box with an arrow pointing up)." />
                      <Step n="3" title="Tap Add to Home Screen" desc="Scroll down in the share sheet and tap Add to Home Screen." />
                      <Step n="4" title="Tap Add" desc="Confirm by tapping Add in the top right. PasturePal will appear on your home screen! 🐄" />
                    </div>

                    <div style={{ background: isIOS ? C.cream : `${C.sage}12`, border:`1.5px solid ${isIOS ? C.parchment : C.sage+"44"}`, borderRadius:14, padding:"16px 18px" }}>
                      <div style={{ fontFamily:F.body, fontSize:11, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", color: isIOS ? C.pebble : C.sage, marginBottom:14 }}>
                        🤖 Android (Chrome)
                      </div>
                      <Step n="1" title="Open in Chrome" desc="Make sure you're using Chrome on your Android device." />
                      <Step n="2" title="Tap the ⋮ menu" desc="Tap the three-dot menu in the top right corner of Chrome." />
                      <Step n="3" title="Tap Add to Home Screen" desc="Select Add to Home Screen from the menu." />
                      <Step n="4" title="Tap Add" desc="Confirm and PasturePal will appear on your home screen like any other app. 🐄" />
                    </div>
                  </div>
                )}
              </Modal>
            );
          })()}
          {showAdd      && <AddAnimalModal onSave={addAnimal} onClose={() => setShowAdd(false)} canAdd={isPro || animals.length < FREE_LIMIT} />}
          {showUpgrade  && <UpgradeModal onClose={() => setShowUpgrade(false)} onUpgrade={() => setIsPro(true)} />}
          {showGestation    && <GestationModal animals={animals} onClose={() => setShowGestation(false)} onAddReminder={(animalId, r) => { setAnimals(p => p.map(a => a.id === animalId ? { ...a, reminders: [...(a.reminders||[]), r] } : a)); }} />}
          {showSymptomCheck && <SymptomCheckerModal animals={animals} onClose={() => setShowSymptomCheck(false)} isPro={isPro} onUpgrade={() => { setShowSymptomCheck(false); setShowUpgrade(true); }} />}
          {showDigest       && <WeeklyDigestModal animals={animals} onClose={() => setShowDigest(false)} isPro={isPro} onUpgrade={() => { setShowDigest(false); setShowUpgrade(true); }} />}
          {showQuickWeight  && animals.length > 0 && <QuickWeightModal animals={animals} onClose={() => setShowQuickWeight(false)} onSave={(animalId, lbs) => { const today = new Date().toISOString().slice(0,10); setAnimals(p => p.map(a => a.id === animalId ? { ...a, weight: [...(a.weight||[]), { date: today, lbs }] } : a)); setShowQuickWeight(false); }} />}
          {showAutoSchedule && <AutoScheduleModal animal={showAutoSchedule} onClose={() => setShowAutoSchedule(null)} onAddReminders={reminders => { setAnimals(p => p.map(a => a.id === showAutoSchedule.id ? { ...a, reminders: [...(a.reminders||[]), ...reminders] } : a)); }} />}
          {showReminder !== null && (
            <SmartReminderModal
              animals={animals}
              preType={showReminder}
              onSave={handleReminderSave}
              onClose={() => setShowReminder(null)}
            />
          )}
        </div>
      );
    }

    // ── Mount ─────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(<PasturePal />);
    const loader = document.getElementById("app-loader");
    if (loader) loader.remove();
  </script>

<!-- ── Cookie Consent Banner ── -->
<div id="cookie-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#2C2318;color:#F5EDD8;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;box-shadow:0 -4px 24px rgba(0,0,0,0.3);">
  <p style="margin:0;font-size:12px;line-height:1.5;max-width:600px;font-family:sans-serif;">
    We use cookies for analytics (Google Analytics). See our <a href="privacy.html" style="color:#A8C5A0;text-decoration:underline;">Privacy Policy</a>.
  </p>
  <div style="display:flex;gap:8px;flex-shrink:0;">
    <button onclick="cookieConsent('decline')" style="background:transparent;border:1.5px solid rgba(245,237,216,0.3);color:#F5EDD8;padding:7px 16px;border-radius:100px;font-size:12px;font-family:sans-serif;font-weight:600;cursor:pointer;">Decline</button>
    <button onclick="cookieConsent('accept')" style="background:#4D7057;border:none;color:#F5EDD8;padding:7px 16px;border-radius:100px;font-size:12px;font-family:sans-serif;font-weight:600;cursor:pointer;">Accept</button>
  </div>
</div>
<script>
  (function() {
    var consent = localStorage.getItem('pp_cookie_consent');
    if (!consent) {
      document.getElementById('cookie-banner').style.display = 'flex';
    } else if (consent === 'decline') {
      window['ga-disable-G-B61GZDRV4Y'] = true;
    }
  })();
  function cookieConsent(choice) {
    localStorage.setItem('pp_cookie_consent', choice);
    document.getElementById('cookie-banner').style.display = 'none';
    if (choice === 'decline') {
      window['ga-disable-G-B61GZDRV4Y'] = true;
    }
  }
</script>
</body>
</html>
