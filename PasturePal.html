      const m = new Date().getMonth();
      if (m >= 2 && m <= 4) return SEASONS.spring;

      if (!canNotify()) return false;
      if (Notification.permission === "granted") return true;
      const p = await Notification.requestPermission();
      return p === "granted";
    }

    function fireNotification(title, body, tag) {
      if (!canNotify() || Notification.permission !== "granted") return;
      try { new Notification(title, { body, tag, icon: "" }); } catch(e) {}
    }

    function scheduleNotifications(animals) {
      if (!canNotify() || Notification.permission !== "granted") return;
      animals.forEach(animal => {

    function getZoneClimBand(zone) {
      if (!zone) return "temperate";
      const fd = FROST_DATES[zone.toLowerCase()];
      return fd ? fd.climBand : "temperate";
    }

    function getMonthlyTask(zone) {
      const band = getZoneClimBand(zone);
      const tasks = MONTHLY_TASKS[band] || MONTHLY_TASKS.temperate;
      return tasks[new Date().getMonth()];
    }

    function daysInGround(plantedDate) {
      if (!plantedDate) return 0;
      return Math.floor((Date.now() - new Date(plantedDate).getTime()) / 86400000);
    }

    function getPlantProgress(plant) {
      if (!plant.planted) return 0;
      const d = daysInGround(plant.planted);
      return Math.min(100, Math.round((d / plant.daysToHarvest) * 100));
    }

    function getGardenGCalUrl(plantName, dateStr, notes) {
      if (!dateStr) return null;
      const d = dateStr.replace(/-/g, "");
      const title = encodeURIComponent("🌱 PasturePal Harvest: " + plantName);
      const detail = encodeURIComponent("Garden reminder from PasturePal." + (notes ? "\n\n" + notes : ""));
      return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${d}T080000/${d}T090000&details=${detail}`;
    }

    // ── AI (backend proxy via /api/chat) ─────────────────────────────
    async function askAI(system, messages, maxTokens = 600) {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system, messages, maxTokens }),
      });
      const data = await res.json().catch(() => ({ error: res.statusText }));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data.content || "";
    }

    const GESTATION_DAYS = { Cattle:283, Horse:340, Goat:150, Sheep:147, Pig:114, Rabbit:31, Chicken:21, Duck:28, default:150 };

    function SmartReminderModal({ onSave, onClose, animals, preType, preAnimalId }) {
      const [type, setType]           = useState(preType || "custom");
      const [animalId, setAnimalId]   = useState(preAnimalId || (animals[0]?.id || ""));
      const [text, setText]           = useState("");
      const [due, setDue]             = useState("");
      const [bredDate, setBredDate]   = useState("");
      const [recurrence, setRecurrence] = useState("One-time");
      const [notes, setNotes]         = useState("");
      const [saved, setSaved]         = useState(false);
      const [savedReminder, setSavedReminder] = useState(null);

      const rt = getReminderType(type);

      useEffect(() => {
        const rt = getReminderType(type);
        setText(rt.defaultText);
        setRecurrence(rt.defaultRecurrence);
        if (type !== "calving") setBredDate("");
      }, [type]);

      // Auto-calculate due date when bred date is entered for calving
      useEffect(() => {
        if (type !== "calving" || !bredDate) return;
        const animal = animals.find(a => a.id === animalId);
        const days = GESTATION_DAYS[animal?.species] || GESTATION_DAYS.default;
        const d = new Date(bredDate + "T12:00:00");
        d.setDate(d.getDate() + days);
        setDue(d.toISOString().split("T")[0]);
        setNotes(`Bred: ${fmt(bredDate)} · Gestation: ${days} days`);
      }, [bredDate, animalId, type]);

      const selectedAnimal = animals.find(a => a.id === animalId);

      function handleSave() {
        const r = { id: uid(), type, text: text || rt.defaultText, due, recurrence, notes };
        setSavedReminder(r);
        setSaved(true);
        onSave(animalId, r);
      }

      if (saved && savedReminder) {
        const gcUrl = getGCalUrl(savedReminder.text, savedReminder.due, savedReminder.notes, selectedAnimal?.name);
        return (
          <Modal title="Reminder Added!" onClose={onClose}>
            <div style={{ textAlign: "center", padding: "10px 0 20px" }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>{rt.icon}</div>
              <div style={{ fontFamily: F.display, fontSize: 20, color: C.dark, fontWeight: 700, marginBottom: 6 }}>{savedReminder.text}</div>
              {savedReminder.due && <div style={{ fontFamily: F.body, fontSize: 14, color: C.stone, marginBottom: 24 }}>Due {fmt(savedReminder.due)} · {savedReminder.recurrence}</div>}
              <div style={{ display: "grid", gap: 10 }}>
                {gcUrl && (
                  <a href={gcUrl} target="_blank" rel="noopener noreferrer" style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, padding: "12px 20px", background: "#4285F4", color: C.white, borderRadius: 10, fontFamily: F.body, fontWeight: 600, fontSize: 13, textDecoration: "none", boxShadow: "0 2px 8px rgba(66,133,244,0.3)" }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
                    Add to Google Calendar
                  </a>
                )}
                <Btn full variant="ghost" onClick={onClose}>Done</Btn>
              </div>
            </div>
          </Modal>
        );
      }

      return (
        <Modal title="Add Smart Reminder" onClose={onClose} wide>
          {/* Type picker */}
          <div style={{ marginBottom: 18 }}>
            <FieldLabel>Reminder Type</FieldLabel>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
              {REMINDER_TYPES.map(t => (
                <button key={t.key} onClick={() => setType(t.key)} className="reminder-type-btn" style={{ padding: "10px 6px", borderRadius: 12, border: `2px solid ${type === t.key ? t.color : C.parchment}`, background: type === t.key ? t.color + "15" : C.white, cursor: "pointer", textAlign: "center" }}>
                  <div style={{ fontSize: 20, marginBottom: 4 }}>{t.icon}</div>
                  <div style={{ fontFamily: F.body, fontSize: 10, fontWeight: type === t.key ? 700 : 500, color: type === t.key ? t.color : C.stone, letterSpacing: "0.02em" }}>{t.label}</div>
                </button>
              ))}
            </div>
            {rt.tip && <div style={{ fontFamily: F.body, fontSize: 12, color: C.stone, marginTop: 8, fontStyle: "italic" }}>💡 {rt.tip}</div>}
          </div>

          {/* Animal selector (only when coming from dashboard) */}
          {!preAnimalId && animals.length > 0 && (
            <div style={{ marginBottom: 14 }}>
              <FieldLabel>Animal</FieldLabel>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {animals.map(a => (
                  <button key={a.id} onClick={() => setAnimalId(a.id)} style={{ padding: "6px 14px", borderRadius: 100, border: `2px solid ${animalId === a.id ? a.color : C.parchment}`, background: animalId === a.id ? a.color + "15" : C.white, cursor: "pointer", fontFamily: F.body, fontSize: 12, fontWeight: animalId === a.id ? 700 : 500, color: animalId === a.id ? a.color : C.stone }}>
                    {a.emoji} {a.name}
                  </button>
                ))}
              </div>
            </div>
          )}

          <Input label="Reminder" value={text} onChange={setText} placeholder={rt.defaultText || "What needs to be done?"} />

          {type === "calving" && (() => {
            const animal = animals.find(a => a.id === animalId);
            const days = GESTATION_DAYS[animal?.species] || GESTATION_DAYS.default;
            return (
              <div style={{ background: `${C.dustyRose}12`, border: `1.5px solid ${C.dustyRose}44`, borderRadius: 12, padding: "14px 14px 10px", marginBottom: 4 }}>
                <Input label="Bred Date" value={bredDate} onChange={setBredDate} type="date" />
                {bredDate && due ? (
                  <div style={{ fontFamily: F.body, fontSize: 12, color: C.dustyRose, fontWeight: 600, marginTop: 4 }}>
                    🐣 Expected due date: <strong>{fmt(due)}</strong> &nbsp;·&nbsp; {days}-day gestation for {animal?.species || "this species"}
                  </div>
                ) : (
                  <div style={{ fontFamily: F.body, fontSize: 11, color: C.stone, marginTop: 4, fontStyle: "italic" }}>
                    Enter bred date to auto-calculate due date ({days}-day gestation for {animal?.species || "this species"})
                  </div>
                )}
              </div>
            );
          })()}

          <Input label="Due Date" value={due} onChange={setDue} type="date" />
          <Select label="Repeats" value={recurrence} onChange={setRecurrence} options={RECURRENCES} />

          <Input label="Notes (optional)" value={notes} onChange={setNotes} placeholder="Any extra details…" rows={2} />

          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
            <Btn variant="ghost" small onClick={onClose}>Cancel</Btn>
            <Btn variant="primary" small disabled={!text && !rt.defaultText} onClick={handleSave}>Save Reminder</Btn>
          </div>
        </Modal>
      );
    }

    // ── Photo Upload ──────────────────────────────────────────────────
    function PhotoUpload({ photos = [], onAdd, onRemove, isPro, maxFree = 2 }) {
      const inputRef = useRef();
      const canAdd = isPro || photos.length < maxFree;
      const handleFile = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => onAdd({ id: uid(), src: ev.target.result, date: new Date().toISOString().split("T")[0] });
        reader.readAsDataURL(file); e.target.value = "";
      };
      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 10 }}>
            {photos.map(p => (
              <div key={p.id} style={{ position: "relative", borderRadius: 12, overflow: "hidden", aspectRatio: "1", border: `1.5px solid ${C.parchment}` }}>
                <img src={p.src} alt="animal" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                <button onClick={() => onRemove(p.id)} style={{ position: "absolute", top: 5, right: 5, background: "rgba(30,21,9,0.7)", border: "none", borderRadius: 6, width: 24, height: 24, color: C.cream, cursor: "pointer", fontSize: 11, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
              </div>
            ))}
            {canAdd && (
              <div onClick={() => inputRef.current.click()} style={{ borderRadius: 12, border: `2px dashed ${C.parchment}`, aspectRatio: "1", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer", background: C.cream, gap: 6 }}>
                <span style={{ fontSize: 22, color: C.pebble }}>+</span>
                <span style={{ fontFamily: F.body, fontSize: 10, color: C.stone, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600 }}>Photo</span>
              </div>
            )}
          </div>
          {!isPro && photos.length >= maxFree && <p style={{ fontFamily: F.body, fontSize: 12, color: C.sage, marginBottom: 6, fontWeight: 500 }}>✦ Upgrade for unlimited photos</p>}
          <input ref={inputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleFile} />
        </div>
      );
    }

            </h2>
            <p style={{ fontFamily: F.body, color: C.stone, margin: "0 0 4px", fontSize: 14 }}>Your complete homestead & small farm companion.</p>
            <p style={{ fontFamily: F.display, color: C.terracotta, fontSize: 13, fontStyle: "italic" }}>Built for real farmers. Priced for small operations.</p>
          </div>

          {/* Billing toggle */}
          <div style={{ display: "flex", background: C.cream, borderRadius: 12, padding: 4, marginBottom: 24, border: `1.5px solid ${C.parchment}`, gap: 4 }}>
            {[["monthly", `$${STRIPE_CONFIG.monthlyAmount} / month`], ["yearly", `$${STRIPE_CONFIG.yearlyAmount} / year`]].map(([v, label]) => (
              <button key={v} onClick={() => setBilling(v)} style={{ flex: 1, padding: "9px 8px", borderRadius: 9, border: "none", cursor: "pointer", fontFamily: F.body, fontSize: 12, fontWeight: billing === v ? 700 : 500, background: billing === v ? C.white : "transparent", color: billing === v ? C.dark : C.stone, boxShadow: billing === v ? "0 2px 6px rgba(42,31,14,0.1)" : "none", transition: "all 0.15s" }}>
                {label}
                {v === "yearly" && <span style={{ marginLeft: 6, background: C.terracotta + "22", color: C.terracotta, borderRadius: 100, padding: "1px 7px", fontSize: 10, fontWeight: 700 }}>BEST VALUE</span>}
              </button>

          </div>
          {saving && <div style={{ textAlign: "center", fontFamily: F.body, fontSize: 12, color: C.sage, fontWeight: 600, marginTop: -16, marginBottom: 18 }}>✓ {saving}</div>}

          {/* Features */}
          <div style={{ display: "grid", gap: 10, marginBottom: 26 }}>
            {features.map(({ icon, text }) => (
              <div key={text} style={{ display: "flex", alignItems: "center", gap: 12, padding: "3px 0" }}>
                <div style={{ width: 32, height: 32, borderRadius: 9, background: C.sagePale, border: `1.5px solid ${C.sageLight}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, flexShrink: 0 }}>{icon}</div>
                <span style={{ fontFamily: F.body, fontSize: 13, color: C.brown, fontWeight: 500 }}>{text}</span>
                <div style={{ marginLeft: "auto", color: C.sage, fontWeight: 700 }}>✓</div>
              </div>
            ))}
          </div>

          <Btn full variant="primary" style={{ fontSize: 14, padding: "14px 24px", borderRadius: 12 }}
            disabled={checkoutLoading}
            onClick={async () => {
              setCheckoutLoading(true);
              await startStripeCheckout(billing === "monthly" ? STRIPE_CONFIG.monthlyPriceId : STRIPE_CONFIG.yearlyPriceId);
              setCheckoutLoading(false);
            }}>
            {checkoutLoading ? "Redirecting to Stripe…" : `Start 14-Day Free Trial — ${price} →`}
          </Btn>
          <p style={{ fontFamily: F.body, fontSize: 11, color: C.pebble, textAlign: "center", marginTop: 12 }}>Cancel anytime · No hidden fees · Powered by Stripe</p>
        </Modal>
      );
    }

    // ── Add Animal ────────────────────────────────────────────────────
    const EMOJIS = { Cattle:"🐄", Goat:"🐐", Pig:"🐷", Sheep:"🐑", Chicken:"🐔", Horse:"🐴", Rabbit:"🐰", Duck:"🦆", Other:"🐾" };
    const PALETTE = [C.terracotta, C.sage, C.dustyRose, C.sky, C.wheat, C.lavender, C.meadow];

    function AddAnimalModal({ onSave, onClose, canAdd }) {
      const [f, setF] = useState({ name: "", species: "Cattle", breed: "", sex: "Female", dob: "", tag: "", notes: "" });
      const s = (k, v) => setF(p => ({ ...p, [k]: v }));
      return (
        <Modal title="Add to Your Herd" onClose={onClose}>
          {!canAdd && <div style={{ background: C.sagePale, border: `1.5px solid ${C.sageLight}`, borderRadius: 12, padding: 14, marginBottom: 20, fontFamily: F.body, fontSize: 13, color: C.sageDark, lineHeight: 1.6 }}>You've reached the 10-animal free limit. <strong>Upgrade to Pro</strong> for unlimited animals.</div>}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
            <div style={{ gridColumn: "1/-1" }}><Input label="Name *" value={f.name} onChange={v => s("name", v)} placeholder="e.g. Biscuit" /></div>
            <Select label="Species" value={f.species} onChange={v => s("species", v)} options={Object.keys(EMOJIS)} />
            <Input label="Breed" value={f.breed} onChange={v => s("breed", v)} placeholder="e.g. Hereford" />
            <Select label="Sex" value={f.sex} onChange={v => s("sex", v)} options={["Female", "Male", "Wether", "Steer", "Castrated"]} />
            <Input label="Tag / ID" value={f.tag} onChange={v => s("tag", v)} placeholder="e.g. HF-001" />
            <div style={{ gridColumn: "1/-1" }}><Input label="Date of Birth" value={f.dob} onChange={v => s("dob", v)} type="date" /></div>
            <div style={{ gridColumn: "1/-1" }}><Input label="Notes" value={f.notes} onChange={v => s("notes", v)} placeholder="Personality, quirks, health notes…" rows={3} /></div>
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
            <Btn variant="ghost" small onClick={onClose}>Cancel</Btn>
            <Btn variant="primary" small disabled={!f.name || !canAdd} onClick={() => { if (!f.name || !canAdd) return; onSave({ ...f, id: uid(), emoji: EMOJIS[f.species] || "🐾", color: PALETTE[Math.floor(Math.random() * PALETTE.length)], meds: [], calving: [], reminders: [], photos: [], weight: [] }); }}>Add to Herd</Btn>
          </div>
        </Modal>
      );
    }

    function QuickAddModal({ title, fields, onSave, onClose }) {
      const [f, setF] = useState(() => Object.fromEntries(fields.map(x => [x.key, ""])));
      return (
        <Modal title={title} onClose={onClose}>
          {fields.map(field => field.type === "select"
            ? <Select key={field.key} label={field.label} value={f[field.key]} onChange={v => setF(p => ({ ...p, [field.key]: v }))} options={field.options} />
            : <Input key={field.key} label={field.label} value={f[field.key]} onChange={v => setF(p => ({ ...p, [field.key]: v }))} type={field.type || "text"} rows={field.rows} />
          )}
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
            <Btn variant="ghost" small onClick={onClose}>Cancel</Btn>
            <Btn variant="primary" small onClick={() => onSave({ ...f, id: uid() })}>Save</Btn>
          </div>
        </Modal>
      );
    }

    // ── Animal Avatar ─────────────────────────────────────────────────
    function AnimalAvatar({ animal, size = 52, radius = 12 }) {
      return (
        <div style={{ width: size, height: size, borderRadius: radius, background: `linear-gradient(135deg, ${animal.color}33, ${animal.color}11)`, border: `2px solid ${animal.color}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.5, flexShrink: 0, overflow: "hidden" }}>
          {animal.photos?.[0] ? <img src={animal.photos[0].src} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt={animal.name} /> : animal.emoji}
        </div>
      );
    }

    // ── Reminder Card ─────────────────────────────────────────────────
    function ReminderCard({ reminder, animalName, onDelete }) {
      const rt = getReminderType(reminder.type);
      const d = daysUntil(reminder.due);
      const overdue = d !== null && d < 0;
      const urgent  = d !== null && d <= 3 && d >= 0;
      const soon    = d !== null && d <= 7 && d >= 0;
      const statusColor = overdue ? C.terracotta : urgent ? C.amber : soon ? C.wheat : C.sage;
      const gcUrl = getGCalUrl(reminder.text, reminder.due, reminder.notes, animalName);

      return (
        <Card style={{ padding: "16px 18px" }}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
            <div style={{ width: 44, height: 44, borderRadius: 12, background: rt.color + "18", border: `1.5px solid ${rt.color}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>
              {rt.icon}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: F.body, fontWeight: 700, color: C.dark, fontSize: 15, marginBottom: 4 }}>{reminder.text}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
                {reminder.due && <Badge color={statusColor} small>{overdue ? "Overdue" : d === 0 ? "Today" : d === 1 ? "Tomorrow" : `In ${d} days`} · {fmt(reminder.due)}</Badge>}
                {reminder.recurrence && reminder.recurrence !== "One-time" && <Badge outline small>↻ {reminder.recurrence}</Badge>}
              </div>
              {reminder.notes && <div style={{ fontFamily: F.body, fontSize: 12, color: C.stone, marginTop: 6 }}>{reminder.notes}</div>}
              {/* Actions */}
              <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                {gcUrl && (
                  <a href={gcUrl} target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 12px", background: "#4285F415", border: "1px solid #4285F444", borderRadius: 8, fontFamily: F.body, fontSize: 11, fontWeight: 600, color: "#4285F4", textDecoration: "none", letterSpacing: "0.02em" }}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="#4285F4"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
                    Add to Google Calendar
                  </a>
                )}
              </div>
            </div>
            {onDelete && <button onClick={onDelete} style={{ background: "none", border: "none", cursor: "pointer", color: C.pebble, fontSize: 16, paddingTop: 2 }}>✕</button>}
          </div>
        </Card>
      );
    }

          </div>
        </Modal>
      );
    }

    // ── Delete Confirm Modal ──────────────────────────────────────────
    function DeleteConfirmModal({ animal, onConfirm, onClose }) {

        <Modal title="Remove Animal?" onClose={onClose}>
          <div style={{ textAlign: "center", padding: "8px 0 20px" }}>

            <p style={{ fontFamily: F.body, fontSize: 15, color: C.dark, marginBottom: 6, fontWeight: 600 }}>Remove {animal.name} from your herd?</p>

            </div>
          </div>
        </Modal>
      );
    }

    // ── Animal Detail ─────────────────────────────────────────────────
    function AnimalDetail({ animal, onUpdate, onBack, onDelete, isPro, onUpgrade }) {
      const [tab, setTab]   = useState("overview");

      const upd = patch => onUpdate({ ...animal, ...patch });

                  {animal.tag && <Badge outline>#{animal.tag}</Badge>}

              {/* Edit / Delete actions */}

            <div style={{ display: "flex", borderTop: `1px solid ${animal.color}22`, marginTop: 4 }}>

                {t.label}

          </div>

          {tab === "overview" && (
            <div style={{ display: "grid", gap: 14 }} className="pp-animate">
              {animal.notes && <Card style={{ borderLeft: `3px solid ${animal.color}`, paddingLeft: 18 }}><div style={{ fontFamily: F.body, fontSize: 10, color: animal.color, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700, marginBottom: 8 }}>Notes</div><p style={{ margin: 0, fontFamily: F.body, fontSize: 14, color: C.brown, lineHeight: 1.75 }}>{animal.notes}</p></Card>}
              <Card>
                <div style={{ fontFamily: F.body, fontSize: 10, color: C.sage, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700, marginBottom: 16 }}>Animal Info</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  {[["Date of Birth", fmt(animal.dob)], ["Species", `${animal.emoji} ${animal.species}`], ["Breed", animal.breed || "—"], ["Latest Weight", latestWeight ? `${latestWeight.lbs} lbs` : "—"]].map(([k, v]) => (

              {!isPro && (

                  <div style={{ fontFamily: F.display, fontSize: 20, color: C.dark, marginBottom: 6, fontWeight: 700 }}>Unlock Pro Features</div>
                  <div style={{ fontFamily: F.body, fontSize: 13, color: C.stone, marginBottom: 18, lineHeight: 1.65, maxWidth: 260, margin: "0 auto 18px" }}>AI homestead assistant, unlimited photos, breeding tracker & more — just $6/mo</div>

          {tab === "photos" && (

              {(animal.photos || []).length === 0 && <div style={{ textAlign: "center", padding: "32px 0 16px" }}><div style={{ fontSize: 40, marginBottom: 12, opacity: 0.3 }}>📷</div><div style={{ fontFamily: F.body, fontSize: 14, color: C.stone }}>No photos yet</div></div>}

              {(animal.meds || []).length === 0 && <div style={{ textAlign: "center", padding: "40px 0" }}><div style={{ fontSize: 36, opacity: 0.3, marginBottom: 12 }}>💉</div><div style={{ fontFamily: F.body, fontSize: 14, color: C.stone }}>No medications recorded</div></div>}
              {(animal.meds || []).map(m => {
                const d = daysUntil(m.due); const urgent = d !== null && d <= 14 && d >= 0; const overdue = d !== null && d < 0;
                return (
                  <Card key={m.id} style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
                    <div style={{ width: 42, height: 42, borderRadius: 12, background: urgent || overdue ? C.terracotta + "15" : C.sagePale, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>💉</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontFamily: F.body, fontWeight: 700, color: C.dark, fontSize: 15 }}>{m.name}</div>
                      <div style={{ fontFamily: F.mono, fontSize: 11, color: C.pebble, marginTop: 3 }}>Given: {fmt(m.date)}</div>
                      {m.due && <div style={{ marginTop: 4 }}><Badge color={overdue ? C.terracotta : urgent ? C.wheat : C.sage} small>{overdue ? "Overdue" : urgent ? `Due in ${d}d` : `Next: ${fmt(m.due)}`}</Badge></div>}
                      {m.notes && <div style={{ fontFamily: F.body, fontSize: 13, color: C.stone, marginTop: 6 }}>{m.notes}</div>}
                    </div>
                    <button onClick={() => upd({ meds: (animal.meds || []).filter(x => x.id !== m.id) })} style={{ background: "none", border: "none", cursor: "pointer", color: C.pebble, fontSize: 16 }}>✕</button>
                  </Card>
                );
              })}
            </div>
          )}

          {tab === "calving" && (
            <div style={{ display: "grid", gap: 12 }} className="pp-animate">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <h4 style={{ margin: 0, fontFamily: F.display, color: C.dark, fontSize: 20, fontWeight: 700 }}>Birth Records</h4>
                <Btn small variant="outline" onClick={() => setModal("calving")} icon="＋">Add</Btn>
              </div>
              {(animal.calving || []).length === 0 && <div style={{ textAlign: "center", padding: "40px 0" }}><div style={{ fontSize: 36, opacity: 0.3, marginBottom: 12 }}>🌱</div><div style={{ fontFamily: F.body, fontSize: 14, color: C.stone }}>No birth records</div></div>}
              {(animal.calving || []).map(c => (
                <Card key={c.id} style={{ borderLeft: `3px solid ${C.sage}`, paddingLeft: 18 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div><div style={{ fontFamily: F.body, fontWeight: 700, color: C.dark, fontSize: 15 }}>{c.calfName || "Unnamed"}</div><div style={{ fontFamily: F.mono, fontSize: 11, color: C.pebble, marginTop: 3 }}>{fmt(c.date)}</div>{c.notes && <div style={{ fontFamily: F.body, fontSize: 13, color: C.stone, marginTop: 6 }}>{c.notes}</div>}</div>
                    <Badge color={C.sage} small>{c.calfSex}</Badge>

          {tab === "reminders" && (
            <div style={{ display: "grid", gap: 12 }} className="pp-animate">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <h4 style={{ margin: 0, fontFamily: F.display, color: C.dark, fontSize: 20, fontWeight: 700 }}>Reminders</h4>
                <Btn small variant="primary" onClick={() => setModal("reminder")} icon="＋">Add Reminder</Btn>
              </div>

              {/* Quick type shortcuts */}
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {REMINDER_TYPES.filter(t => t.key !== "custom").map(t => (
                  <button key={t.key} onClick={() => setModal("reminder-" + t.key)} style={{ padding: "5px 12px", borderRadius: 100, border: `1.5px solid ${t.color}44`, background: t.color + "12", cursor: "pointer", fontFamily: F.body, fontSize: 11, fontWeight: 600, color: t.color, display: "flex", alignItems: "center", gap: 5 }}>
                    {t.icon} {t.label}
                  </button>
                ))}
              </div>

              {(animal.reminders || []).length === 0 && <div style={{ textAlign: "center", padding: "40px 0" }}><div style={{ fontSize: 36, opacity: 0.3, marginBottom: 12 }}>🔔</div><div style={{ fontFamily: F.body, fontSize: 14, color: C.stone }}>No reminders set</div><div style={{ fontFamily: F.body, fontSize: 12, color: C.pebble, marginTop: 4 }}>Add a reminder above to stay on schedule</div></div>}
              {(animal.reminders || []).map(r => (
                <ReminderCard key={r.id} reminder={r} animalName={animal.name} onDelete={() => upd({ reminders: (animal.reminders || []).filter(x => x.id !== r.id) })} />
              ))}
            </div>
          )}

          {tab === "ai" && (
            <div className="pp-animate">
              <AnimalAIChat animal={animal} isPro={isPro} onUpgrade={onUpgrade} />
            </div>

          {modal === "med"      && <QuickAddModal title="Add Medication" onClose={() => setModal(null)} fields={[{ key: "name", label: "Medication Name" }, { key: "date", label: "Date Given", type: "date" }, { key: "due", label: "Next Due Date", type: "date" }, { key: "notes", label: "Notes", rows: 2 }]} onSave={d => { upd({ meds: [...(animal.meds || []), d] }); setModal(null); }} />}
          {modal === "calving"  && <QuickAddModal title="Add Birth Record" onClose={() => setModal(null)} fields={[{ key: "date", label: "Birth Date", type: "date" }, { key: "calfName", label: "Name" }, { key: "calfSex", label: "Sex", type: "select", options: ["Female", "Male"] }, { key: "notes", label: "Notes", rows: 2 }]} onSave={d => { upd({ calving: [...(animal.calving || []), d] }); setModal(null); }} />}
          {modal === "edit"   && <EditAnimalModal animal={animal} onClose={() => setModal(null)} onSave={f => { upd(f); setModal(null); }} />}
          {modal === "delete" && <DeleteConfirmModal animal={animal} onClose={() => setModal(null)} onConfirm={() => { setModal(null); onDelete(animal.id); }} />}

          {/* Reminder modals — generic or typed */}
          {(modal === "reminder" || (modal && modal.startsWith("reminder-"))) && (
            <SmartReminderModal
              animals={[animal]}
              preType={modal === "reminder" ? "custom" : modal.replace("reminder-", "")}
              preAnimalId={animal.id}
              onSave={(animalId, r) => { upd({ reminders: [...(animal.reminders || []), r] }); }}
              onClose={() => setModal(null)}

    // ── AI Chat ───────────────────────────────────────────────────────
    const QUICK_PROMPTS = ["Is this calf healthy?", "Deworming schedule?", "Signs of milk fever?", "What to plant this season?", "Hoof care tips?"];

    function AIChat({ animals, isPro, onUpgrade, farmProfile, zipCode }) {
      const greeting = farmProfile?.name
        ? `Howdy from ${farmProfile.name}! 🐄\n\nI'm your AI homestead assistant — ask me anything about your animals, health, calving, planting, pasture management, and more.`
        : "Howdy from PasturePal! 🐄\n\nI'm your AI homestead assistant — ask me anything about your animals, health, calving, planting, pasture management, and more.";
      const [msgs, setMsgs] = useState([{ role: "assistant", content: greeting }]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const bottomRef = useRef();
      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

      const send = async () => {
        if (!input.trim() || loading) return;
        const txt = input.trim();
        const newMsgs = [...msgs, { role: "user", content: txt }];
        setMsgs(newMsgs); setInput(""); setLoading(true);
        try {
          const farmCtx = [
            farmProfile?.name ? `Farm name: ${farmProfile.name}` : null,
            farmProfile?.type ? `Farm type: ${farmProfile.type}` : null,
            zipCode           ? `Location zip: ${zipCode}`       : null,
          ].filter(Boolean).join(", ");
          const systemPrompt = `You are a knowledgeable homestead assistant for PasturePal.${farmCtx ? ` The user's farm: ${farmCtx}.` : ""} They have ${animals.length} animal(s): ${animals.map(a => `${a.name} (${a.species})`).join(", ") || "none yet"}. Help with animal health, calving, pasture management, feeding, seasonal planning, and general homesteading advice. Tailor advice to their farm type and location when relevant. Be friendly, practical, and concise.`;
          const reply = await askAI(systemPrompt, newMsgs.map(m => ({ role: m.role, content: m.content })));
          setMsgs(p => [...p, { role: "assistant", content: reply }]);
        } catch (err) {
          setMsgs(p => [...p, { role: "assistant", content: `⚠️ Something went wrong: ${err.message}` }]);
        }
        setLoading(false);
      };

      if (!isPro) return (
        <div style={{ textAlign: "center", padding: "52px 20px" }} className="pp-animate">
          <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 92, height: 92, borderRadius: "50%", background: `linear-gradient(135deg, ${C.cream}, ${C.parchment})`, border: `2px solid ${C.parchment}`, boxShadow: `0 0 0 6px ${C.offWhite}, 0 0 0 8px ${C.parchment}55`, marginBottom: 22 }}><HighlandCowLogo size={60} color={C.midBrown} /></div>
          <h3 style={{ fontFamily: F.display, color: C.dark, margin: "0 0 10px", fontSize: 26, fontWeight: 800 }}>AI Homestead Assistant</h3>
          <p style={{ fontFamily: F.body, color: C.stone, lineHeight: 1.7, fontSize: 14, maxWidth: 300, margin: "0 auto 6px" }}>Ask anything — animal health, calving, pasture management, seasonal planting, feed, and more.</p>
          <p style={{ fontFamily: F.body, fontSize: 11, color: C.pebble, margin: "0 auto 28px", letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 600 }}>Pro feature · From $6/month</p>
          <Btn variant="primary" onClick={onUpgrade} style={{ padding: "12px 28px", fontSize: 14 }}>Unlock AI Assistant</Btn>
        </div>
      );

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 240px)", minHeight: 380 }}>
          <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 14, paddingBottom: 8 }}>
            {msgs.map((m, i) => (
              <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: m.role === "user" ? "flex-end" : "flex-start", gap: 4 }}>
                {m.role === "assistant" && <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2, paddingLeft: 2 }}><div style={{ width: 20, height: 20, borderRadius: "50%", background: C.sage + "22", border: `1px solid ${C.sage}44`, display: "flex", alignItems: "center", justifyContent: "center" }}><HighlandCowLogo size={12} color={C.sageDark} /></div><span style={{ fontFamily: F.body, fontSize: 10, color: C.stone, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em" }}>Homestead AI</span></div>}
                <div style={{ maxWidth: "80%", padding: "12px 16px", borderRadius: m.role === "user" ? "18px 18px 4px 18px" : "4px 18px 18px 18px", background: m.role === "user" ? C.brown : C.white, color: m.role === "user" ? C.cream : C.dark, fontFamily: F.body, fontSize: 14, lineHeight: 1.7, border: m.role === "user" ? "none" : `1.5px solid ${C.parchment}`, boxShadow: m.role === "user" ? "0 2px 8px rgba(61,43,16,0.2)" : "0 1px 4px rgba(42,31,14,0.05)", whiteSpace: "pre-wrap" }}>{m.content}</div>
              </div>
            ))}
            {loading && <div style={{ display: "flex", alignItems: "flex-start", gap: 6 }}><div style={{ width: 20, height: 20, borderRadius: "50%", background: C.sage + "22", border: `1px solid ${C.sage}44`, display: "flex", alignItems: "center", justifyContent: "center", marginTop: 4 }}><HighlandCowLogo size={12} color={C.sageDark} /></div><div style={{ padding: "14px 18px", borderRadius: "4px 18px 18px 18px", background: C.white, border: `1.5px solid ${C.parchment}`, display: "flex", gap: 5, alignItems: "center" }}>{[1,2,3].map(n => <div key={n} className={`pp-dot-${n}`} style={{ width: 7, height: 7, borderRadius: "50%", background: C.sage }} />)}</div></div>}
            <div ref={bottomRef} />
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && !e.shiftKey && send()} placeholder="Ask your homestead assistant…" style={{ flex: 1, padding: "11px 15px", borderRadius: 10, border: `1.5px solid ${C.parchment}`, fontFamily: F.body, fontSize: 14, background: C.white, color: C.dark, outline: "none" }} />
            <Btn onClick={send} variant="primary" style={{ borderRadius: 10, padding: "11px 20px" }}>Send</Btn>
          </div>
          <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 6 }}>
            {QUICK_PROMPTS.map(q => <button key={q} onClick={() => setInput(q)} style={{ background: C.white, border: `1.5px solid ${C.parchment}`, borderRadius: 100, padding: "5px 13px", fontFamily: F.body, fontSize: 11, color: C.stone, cursor: "pointer", fontWeight: 500 }}>{q}</button>)}
          </div>

    // ── Dashboard ─────────────────────────────────────────────────────
    // ── Botanical SVG ─────────────────────────────────────────────────
    function LeafCluster({ size = 90, color = C.sage, style = {} }) {
      return (
        <svg width={size} height={size} viewBox="0 0 100 110" fill="none" style={style}>
          {/* Main stem */}
          <path d="M50 105 Q47 78 38 58 Q32 44 28 32" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round" opacity="0.6"/>

          <path d="M28 32 Q18 18 10 6" stroke={color} strokeWidth="0.8" fill="none" strokeLinecap="round" opacity="0.5"/>
          {/* Right leaf */}
          <path d="M28 32 Q46 18 50 4 Q56 22 28 32Z" fill={color} opacity="0.65"/>
          {/* Mid-left leaf */}
          <path d="M38 58 Q18 52 16 36 Q36 42 38 58Z" fill={color} opacity="0.75"/>

          <circle cx="84" cy="10" r="2" fill={color} opacity="0.5"/>
        </svg>
      );
    }

    function SmallSprig({ color = C.sage, size = 40 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 40 50" fill="none">
          <path d="M20 48 Q19 34 15 22" stroke={color} strokeWidth="1.4" fill="none" strokeLinecap="round" opacity="0.5"/>
          <path d="M15 22 Q5 16 6 6 Q16 12 15 22Z" fill={color} opacity="0.7"/>
          <path d="M15 22 Q22 14 24 5 Q26 16 15 22Z" fill={color} opacity="0.55"/>
          <path d="M18 35 Q8 31 8 22 Q18 27 18 35Z" fill={color} opacity="0.6"/>
          <path d="M22 36 Q32 30 32 21 Q22 27 22 36Z" fill={color} opacity="0.45"/>
        </svg>
      );
    }

    // ── Journal Date Header ───────────────────────────────────────────
    function JournalHeader({ isPro, animals, FREE_LIMIT, onAdd, onUpgrade }) {
      const season = getSeason();
      const now = new Date();
      const dateStr = now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });

    // ── Gestation Periods (days) ──────────────────────────────────────
    const GESTATION = {

    };

    // ── Herd Health Score ─────────────────────────────────────────────
    function HerdHealthScore({ animals }) {
      const total = animals.length;
      if (total === 0) return null;

      // Score based on overdue + urgent tasks
      let deductions = 0;
      animals.forEach(a => {
        (a.meds || []).forEach(m => {
          const d = daysUntil(m.due);
          if (d !== null && d < 0)  deductions += 8;   // overdue
          if (d !== null && d <= 7 && d >= 0) deductions += 2; // due soon
        });
        (a.reminders || []).forEach(r => {
          const d = daysUntil(r.due);
          if (d !== null && d < 0)  deductions += 6;
          if (d !== null && d <= 7 && d >= 0) deductions += 1;
        });
      });

      const score = Math.max(0, Math.min(100, 100 - deductions));
      const grade = score >= 95 ? "A+" : score >= 90 ? "A" : score >= 80 ? "B" : score >= 70 ? "C" : score >= 60 ? "D" : "F";
      const color = score >= 90 ? C.sage : score >= 75 ? C.wheat : score >= 60 ? C.amber : C.terracotta;
      const label = score >= 95 ? "Excellent!" : score >= 85 ? "On Track" : score >= 70 ? "Needs Attention" : "Action Required";

      // SVG arc
      const r = 36, cx = 48, cy = 48, stroke = 7;
      const circ = 2 * Math.PI * r;
      const dash = (score / 100) * circ;

      return (
        <Card style={{ padding: "18px 20px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
            {/* Arc gauge */}
            <div style={{ flexShrink: 0, position: "relative" }}>
              <svg width="96" height="96" viewBox="0 0 96 96">
                {/* Track */}
                <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.parchment} strokeWidth={stroke} />
                {/* Progress */}
                <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={stroke}
                  strokeDasharray={`${dash} ${circ}`}
                  strokeLinecap="round"
                  transform={`rotate(-90 ${cx} ${cy})`}
                  style={{ transition: "stroke-dasharray 0.8s ease" }}
                />
                {/* Grade text */}
                <text x={cx} y={cy - 4} textAnchor="middle" fontFamily="'Playfair Display',serif" fontSize="22" fontWeight="800" fill={color}>{grade}</text>
                <text x={cx} y={cy + 14} textAnchor="middle" fontFamily="'Jost',sans-serif" fontSize="10" fontWeight="600" fill={C.stone}>{score}%</text>
              </svg>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: F.body, fontSize: 10, color: C.stone, textTransform: "uppercase", letterSpacing: "0.14em", fontWeight: 700, marginBottom: 6 }}>Herd Health Score</div>
              <div style={{ fontFamily: F.display, fontSize: 20, fontWeight: 700, color: color, marginBottom: 4 }}>{label}</div>
              <div style={{ fontFamily: F.body, fontSize: 12, color: C.stone, lineHeight: 1.55 }}>
                {score === 100
                  ? `All ${total} animal${total > 1 ? "s are" : " is"} on schedule. Great work! 🌿`
                  : `${deductions > 0 ? `${Math.round(deductions / 2)} task${Math.round(deductions / 2) !== 1 ? "s" : ""} need attention across your herd.` : ""}`
                }
              </div>
            </div>
          </div>
        </Card>
      );
    }

    // ── Weight Chart ──────────────────────────────────────────────────
    function WeightChart({ weight = [] }) {
      if (weight.length < 2) {
        return (
          <div style={{ textAlign: "center", padding: "28px 0" }}>
            <div style={{ fontSize: 32, marginBottom: 8, opacity: 0.3 }}>⚖️</div>
            <div style={{ fontFamily: F.body, fontSize: 13, color: C.stone }}>Add at least 2 weight entries to see the chart</div>
          </div>
        );
      }
      const sorted = [...weight].sort((a, b) => new Date(a.date) - new Date(b.date));
      const maxW = Math.max(...sorted.map(w => w.lbs));
      const minW = Math.min(...sorted.map(w => w.lbs));
      const range = maxW - minW || 1;
      const W = 280, H = 100, pad = 16;
      const pts = sorted.map((w, i) => {
        const x = pad + (i / (sorted.length - 1)) * (W - pad * 2);
        const y = H - pad - ((w.lbs - minW) / range) * (H - pad * 2);
        return [x, y, w];
      });
      const pathD = pts.map(([x, y], i) => `${i === 0 ? "M" : "L"}${x},${y}`).join(" ");
      const areaD = `${pathD} L${pts[pts.length-1][0]},${H-pad} L${pts[0][0]},${H-pad} Z`;
      const trend = sorted[sorted.length-1].lbs - sorted[0].lbs;

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontFamily: F.body, fontSize: 10, color: C.sage, textTransform: "uppercase", letterSpacing: "0.12em", fontWeight: 700 }}>Weight History</div>
            <div style={{ fontFamily: F.body, fontSize: 12, fontWeight: 600, color: trend >= 0 ? C.sage : C.terracotta }}>
              {trend >= 0 ? "▲" : "▼"} {Math.abs(trend)} lbs since first record
            </div>
          </div>
          <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: "visible" }}>
            {/* Horizontal guide lines */}
            {[0.25, 0.5, 0.75].map(t => (
              <line key={t} x1={pad} x2={W-pad} y1={H - pad - t * (H - pad*2)} y2={H - pad - t * (H - pad*2)} stroke={C.parchment} strokeWidth="1" strokeDasharray="3,3" />
            ))}
            {/* Area fill */}
            <path d={areaD} fill={C.sage + "18"} />
            {/* Line */}
            <path d={pathD} fill="none" stroke={C.sage} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
            {/* Data points */}
            {pts.map(([x, y, w], i) => (
              <g key={i}>
                <circle cx={x} cy={y} r="5" fill={C.white} stroke={C.sage} strokeWidth="2" />
                {i === pts.length - 1 && (
                  <text x={x} y={y - 10} textAnchor="middle" fontFamily="'DM Mono',monospace" fontSize="10" fill={C.sageDark} fontWeight="600">{w.lbs} lbs</text>
                )}
              </g>
            ))}
          </svg>
          {/* X-axis labels */}
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
            {sorted.map((w, i) => (
              <div key={i} style={{ fontFamily: F.mono, fontSize: 9, color: C.pebble }}>{fmt(w.date).split(",")[0]}</div>
            ))}
          </div>
        </div>
      );
    }

    // ── AI Utilities ──────────────────────────────────────────────────
    const AI_ERROR_MSG = "⚠️ AI features need a backend API proxy — set up /api/chat with your Anthropic key to enable this. Everything else works perfectly!";
    const AI_BACKEND_NOTE = "Backend API key needed";

    async function callAI(system, userContent, maxTokens = 1000) {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system, messages: [{ role: "user", content: userContent }], maxTokens })
      });
      if (!res.ok) throw new Error("API error");
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data.content || "";
    }

    // Resize image before sending — falls back to original if canvas fails
    function resizeImage(base64, mediaType, maxPx = 1024) {
      return new Promise(resolve => {
        try {
          const img = new Image();
          img.onerror = () => resolve(base64); // fallback: send original
          img.onload = () => {
            try {
              const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
              const w = Math.round(img.width * scale);
              const h = Math.round(img.height * scale);
              const canvas = document.createElement("canvas");
              canvas.width = w; canvas.height = h;
              canvas.getContext("2d").drawImage(img, 0, 0, w, h);
              const out = canvas.toDataURL("image/jpeg", 0.82).split(",")[1];
              resolve(out || base64);
            } catch { resolve(base64); }
          };
          img.src = `data:${mediaType};base64,${base64}`;
        } catch { resolve(base64); }
      });
    }

    async function callAIWithImage(system, text, base64, mediaType = "image/jpeg") {
      const resized = await resizeImage(base64, mediaType);
      if (!resized) throw new Error("Could not process image");
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system,
          messages: [{ role: "user", content: text }],
          maxTokens: 700,
          imageBase64: resized,
          imageMediaType: "image/jpeg"
        })
      });
      if (!res.ok) throw new Error("API error");
      const data = await res.json();
      return data.content || "";
    }

    // ── 1. AI Symptom Checker ─────────────────────────────────────────
    const SYMPTOMS_LIST = [

      "Limping / Lameness", "Labored breathing",
      "Nasal or eye discharge", "Swelling or lumps",
      "Diarrhea / Loose stool", "Constipation / Straining",
      "Isolating from herd", "Rapid weight loss",
      "Coughing or sneezing", "Pale or white gums",
      "Hot to touch / Fever", "Bloating / Distended belly",
    ];
    const URGENCY_COLOR = { EMERGENCY: C.terracotta, URGENT: C.amber, MONITOR: C.wheat, LIKELY_FINE: C.sage };
    const URGENCY_ICON  = { EMERGENCY: "🔴", URGENT: "🟠", MONITOR: "🟡", LIKELY_FINE: "🟢" };

    function SymptomCheckerModal({ animals, onClose, isPro, onUpgrade }) {
      const [sel, setSel] = useState(animals[0]);
      const [symptoms, setSymptoms] = useState([]);
      const [extra, setExtra] = useState("");
      const [loading, setLoading] = useState(false);
      const [parsed, setParsed] = useState(null);
      const [error, setError] = useState(null);

      const toggle = s => setSymptoms(p => p.includes(s) ? p.filter(x => x !== s) : [...p, s]);

      const analyze = async () => {
        if (!symptoms.length && !extra.trim()) return;
        setLoading(true); setError(null);
        const a = sel;
        const age = a.dob ? Math.floor((Date.now()-new Date(a.dob))/31557600000)+"yr" : "unknown age";
        const meds = (a.meds||[]).slice(-3).map(m=>m.name).join(", ") || "none";
        const system = `You are an expert veterinary assistant for PasturePal.
Animal: ${a.name}, ${a.breed} ${a.species}, ${a.sex}, ${age}. Recent meds: ${meds}.
Respond EXACTLY in this format (no extra text):
URGENCY: EMERGENCY|URGENT|MONITOR|LIKELY_FINE
LABEL: [e.g. "Call vet immediately"]
SUMMARY: [2 sentences plain English]
CAUSES: [cause 1]|[cause 2]|[cause 3]
ACTIONS: [step 1]|[step 2]|[step 3]
WATCH: [sign 1]|[sign 2]`;
        const msg = `${a.name} symptoms: ${symptoms.join(", ")}${extra ? ". Extra: "+extra : ""}`;
        try {
          const text = await callAI(system, msg, 400);
          const g = k => { const m = text.match(new RegExp(k+":\\s*(.+)")); return m?m[1].trim():""; };
          setParsed({
            urgency: g("URGENCY"), label: g("LABEL"), summary: g("SUMMARY"),
            causes:  g("CAUSES").split("|").filter(Boolean),
            actions: g("ACTIONS").split("|").filter(Boolean),
            watch:   g("WATCH").split("|").filter(Boolean),
          });
        } catch { setError(AI_ERROR_MSG); }
        setLoading(false);
      };

      if (!isPro) return (
        <Modal title="🩺 AI Symptom Checker" onClose={onClose}>
          <ProGate icon="🩺" description="Describe your animal's symptoms and get an urgency assessment, possible causes, and immediate action steps — all AI-powered." onUpgrade={onUpgrade} onClose={onClose} />
        </Modal>
      );

      return (
        <Modal title="🩺 AI Symptom Checker" onClose={onClose} wide>
          {!parsed ? (
            <>
              <FieldLabel>Which animal?</FieldLabel>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>

                  <button key={a.id} onClick={() => setSel(a)} style={{ padding: "6px 14px", borderRadius: 100, border: `2px solid ${sel?.id===a.id ? a.color : C.parchment}`, background: sel?.id===a.id ? a.color+"15" : C.white, cursor: "pointer", fontFamily: F.body, fontSize: 12, fontWeight: 600, color: sel?.id===a.id ? a.color : C.stone }}>
                    {a.emoji} {a.name}
                  </button>
                ))}
              </div>
              <FieldLabel>What are you observing? (select all that apply)</FieldLabel>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 14 }}>
                {SYMPTOMS_LIST.map(s => {
                  const on = symptoms.includes(s);
                  return (
                    <button key={s} onClick={() => toggle(s)} style={{ padding: "8px 12px", borderRadius: 8, border: `1.5px solid ${on ? C.terracotta : C.parchment}`, background: on ? C.terracotta+"12" : C.white, cursor: "pointer", fontFamily: F.body, fontSize: 12, fontWeight: on ? 700 : 400, color: on ? C.terracotta : C.stone, textAlign: "left", transition: "all 0.15s" }}>
                      {on ? "✓ " : ""}{s}
                    </button>
                  );
                })}
              </div>
              <Input label="Additional details (optional)" value={extra} onChange={setExtra} placeholder="How long has this been going on? Any recent feed changes?" rows={2} />
              {error && <div style={{ fontFamily: F.body, fontSize: 12, color: C.amber, padding: "10px 14px", background: C.amber+"12", borderRadius: 8, marginBottom: 12 }}>{error}</div>}
              <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
                <Btn variant="ghost" small onClick={onClose}>Cancel</Btn>
                <Btn variant="primary" small disabled={(!symptoms.length && !extra.trim()) || loading} onClick={analyze}>{loading ? "Analyzing…" : "Analyze Symptoms"}</Btn>
              </div>
            </>
          ) : (
            <>
              <div style={{ background: (URGENCY_COLOR[parsed.urgency]||C.sage)+"18", border: `2px solid ${URGENCY_COLOR[parsed.urgency]||C.sage}44`, borderRadius: 14, padding: "16px 20px", marginBottom: 20, display: "flex", alignItems: "flex-start", gap: 14 }}>

                </div>
              </div>
              {[["🔍 Possible Causes", parsed.causes], ["⚡ Immediate Actions", parsed.actions], ["👁 Watch For", parsed.watch]].map(([title, items]) => items?.length > 0 && (
                <div key={title} style={{ marginBottom: 16 }}>

    }

    // ── 2. Per-Animal AI Chat ─────────────────────────────────────────
    function AnimalAIChat({ animal, isPro, onUpgrade }) {
      const buildCtx = a => {
        const age = a.dob ? Math.floor((Date.now()-new Date(a.dob))/31557600000)+" years old" : "unknown age";
        return `You are the personal AI for ${a.name} in PasturePal. You already know their full record:
Name: ${a.name} | Species: ${a.species} | Breed: ${a.breed} | Sex: ${a.sex} | Age: ${age} | Tag: ${a.tag||"none"}
Notes: ${a.notes||"none"}
Weight history: ${(a.weight||[]).map(w=>`${w.lbs}lbs on ${w.date}`).join(", ")||"none"}
Medications: ${(a.meds||[]).map(m=>`${m.name} (given ${m.date}${m.due?", next "+m.due:""})`).join("; ")||"none"}
Reminders: ${(a.reminders||[]).map(r=>`${r.text} due ${r.due}`).join("; ")||"none"}
Births: ${(a.calving||[]).map(c=>`${c.calfName||"unnamed"} (${c.date})`).join(", ")||"none"}
Use this data to give specific, personal answers. Be warm and practical. Always recommend a vet for serious concerns.`;
      };

      const [msgs, setMsgs] = useState([{ role: "assistant", content: `Hi! I'm ${animal.name}'s personal AI. I already know ${animal.name}'s full history — weight records, medications, reminders, and more. What would you like to know? 🌿` }]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const bottomRef = useRef();
      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

      if (!isPro) return (
        <div style={{ textAlign: "center", padding: "48px 20px" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>{animal.emoji}</div>
          <div style={{ fontFamily: F.display, fontSize: 20, color: C.dark, fontWeight: 700, marginBottom: 8 }}>{animal.name}'s Personal AI</div>
          <div style={{ fontFamily: F.body, fontSize: 13, color: C.stone, lineHeight: 1.65, maxWidth: 280, margin: "0 auto 24px" }}>AI that knows {animal.name}'s complete history — ask anything without having to explain their records.</div>
          <Btn variant="primary" small onClick={onUpgrade}>Upgrade to Pro</Btn>
        </div>
      );

      const send = async () => {
        if (!input.trim() || loading) return;
        const newMsgs = [...msgs, { role: "user", content: input.trim() }];
        setMsgs(newMsgs); setInput(""); setLoading(true);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 600, system: buildCtx(animal), messages: newMsgs.map(m=>({role:m.role,content:m.content})) })
          });
          const data = await res.json();
          setMsgs(p => [...p, { role: "assistant", content: data.content?.map(b=>b.text||"").join("")||AI_ERROR_MSG }]);
        } catch { setMsgs(p => [...p, { role: "assistant", content: AI_ERROR_MSG }]); }
        setLoading(false);
      };

      const qp = [`Is ${animal.name}'s weight trend healthy?`, `What vaccinations does a ${animal.breed} need?`, "Are any medications overdue?", `What's the ideal diet for this ${animal.species}?`];

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 280px)", minHeight: 340 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: C.sagePale, border: `1px solid ${C.sageLight}`, borderRadius: 10, marginBottom: 12 }}>
            <span style={{ fontSize: 14 }}>🧠</span>
            <span style={{ fontFamily: F.body, fontSize: 11, color: C.sageDark, fontWeight: 600 }}>AI has full access to {animal.name}'s records, weight, medications & reminders</span>
          </div>
          <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 12, paddingBottom: 8 }}>
            {msgs.map((m, i) => (
              <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: m.role==="user"?"flex-end":"flex-start", gap: 4 }}>
                {m.role === "assistant" && (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                    <div style={{ width: 20, height: 20, borderRadius: "50%", background: animal.color+"22", border: `1px solid ${animal.color}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>{animal.emoji}</div>
                    <span style={{ fontFamily: F.body, fontSize: 10, color: C.stone, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em" }}>{animal.name}'s AI</span>
                  </div>
                )}
                <div style={{ maxWidth: "80%", padding: "12px 16px", borderRadius: m.role==="user"?"18px 18px 4px 18px":"4px 18px 18px 18px", background: m.role==="user"?C.brown:C.white, color: m.role==="user"?C.cream:C.dark, fontFamily: F.body, fontSize: 14, lineHeight: 1.7, border: m.role==="user"?"none":`1.5px solid ${C.parchment}`, whiteSpace: "pre-wrap" }}>{m.content}</div>
              </div>
            ))}
            {loading && <div style={{ display:"flex",gap:5,padding:"14px 18px",borderRadius:"4px 18px 18px 18px",background:C.white,border:`1.5px solid ${C.parchment}`,width:"fit-content" }}>{[1,2,3].map(n=><div key={n} className={`pp-dot-${n}`} style={{width:7,height:7,borderRadius:"50%",background:C.sage}}/>)}</div>}
            <div ref={bottomRef} />
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder={`Ask about ${animal.name}…`} style={{ flex:1,padding:"11px 15px",borderRadius:10,border:`1.5px solid ${C.parchment}`,fontFamily:F.body,fontSize:14,background:C.white,color:C.dark,outline:"none" }} />
            <Btn onClick={send} variant="primary" style={{ borderRadius:10,padding:"11px 18px" }}>Send</Btn>
          </div>
          <div style={{ marginTop:8,display:"flex",flexWrap:"wrap",gap:6 }}>
            {qp.map(q=><button key={q} onClick={()=>setInput(q)} style={{ background:C.white,border:`1.5px solid ${C.parchment}`,borderRadius:100,padding:"4px 12px",fontFamily:F.body,fontSize:11,color:C.stone,cursor:"pointer" }}>{q}</button>)}
          </div>
        </div>
      );
    }

    // ── 3. AI Auto-Schedule ───────────────────────────────────────────
    const FALLBACK_SCHEDULE = (a) => {

        ],

          { type:"worming",     text:"FAMACHA check & deworming",due:add(21), recurrence:"Every 3 months", notes:"Check eyelid color first" },
          { type:"hoof",        text:"Hoof trim",                due:add(42), recurrence:"Every 6 weeks",  notes:"Goats need frequent trimming" },

          { type:"worming",     text:"Dewormer treatment",       due:add(30), recurrence:"Every 3 months", notes:"" },

        ],
        Sheep: [
          { type:"vaccination", text:"CDT booster",              due:add(21), recurrence:"Annually",       notes:"Core vaccine for sheep" },
          { type:"hoof",        text:"Hoof trim",                due:add(42), recurrence:"Every 6 weeks",  notes:"Prevent foot scald and foot rot" },
          { type:"worming",     text:"Dewormer treatment",       due:add(30), recurrence:"Every 3 months", notes:"" },
        ],
        Horse: [
          { type:"vaccination", text:"Core vaccinations (EWT/WNV)",due:add(30),recurrence:"Annually",     notes:"Eastern/Western/Tetanus + West Nile" },
          { type:"worming",     text:"Dewormer rotation",        due:add(60), recurrence:"Every 3 months", notes:"Rotate product each treatment" },
          { type:"vet",         text:"Dental float",             due:add(90), recurrence:"Annually",       notes:"Horses need annual dental care" },
          { type:"hoof",        text:"Farrier visit",            due:add(42), recurrence:"Every 6 weeks",  notes:"Regular trimming and/or shoeing" },
        ],
      };
      const base = bySpecies[a.species] || bySpecies.Goat;
      return base.map(r => ({ ...r, id: uid() }));
    };

    function AutoScheduleModal({ animal, onAddReminders, onClose }) {
      const [loading, setLoading] = useState(true);
      const [suggestions, setSuggestions] = useState([]);
      const [selected, setSelected] = useState({});
      const [aiGenerated, setAiGenerated] = useState(false);

      useEffect(() => { generate(); }, []);

      const generate = async () => {
        const today = new Date().toISOString().split("T")[0];
        const age = animal.dob ? Math.floor((Date.now()-new Date(animal.dob))/31557600000) : 1;
        const system = `You are a livestock care expert. Respond ONLY with a valid JSON array, zero other text.`;
        const msg = `Generate 5-7 care reminders for: ${animal.name}, ${animal.breed} ${animal.species}, ${animal.sex}, ~${age} years old. Today: ${today}.
Return ONLY JSON like: [{"type":"vaccination","text":"CDT Vaccine","due":"YYYY-MM-DD","recurrence":"Annually","notes":"..."}]
Types: vaccination|feed|hoof|worming|calving|vet|custom. Space dates starting now. Be species-specific.`;
        try {
          const text = await callAI(system, msg, 600);
          const json = JSON.parse(text.match(/\[[\s\S]*\]/)?.[0] || "[]");
          if (json.length > 0) {
            const withIds = json.map(r => ({ ...r, id: uid() }));
            setSuggestions(withIds);
            setSelected(Object.fromEntries(withIds.map(r => [r.id, true])));
            setAiGenerated(true);
          } else throw new Error("empty");
        } catch {
          const fb = FALLBACK_SCHEDULE(animal);
          setSuggestions(fb);
          setSelected(Object.fromEntries(fb.map(r => [r.id, true])));
        }
        setLoading(false);
      };

      const addSelected = () => {
        onAddReminders(suggestions.filter(r => selected[r.id] !== false));
        onClose();

      return (
        <Modal title={`📋 Care Schedule for ${animal.name}`} onClose={onClose} wide>
          {loading ? (
            <div style={{ textAlign:"center",padding:"40px 0" }}>
              <div style={{ display:"flex",justifyContent:"center",gap:8,marginBottom:16 }}>{[1,2,3].map(n=><div key={n} className={`pp-dot-${n}`} style={{width:10,height:10,borderRadius:"50%",background:C.sage}}/>)}</div>
              <div style={{ fontFamily:F.body,fontSize:14,color:C.stone }}>Generating a care schedule for {animal.name}…</div>
            </div>
          ) : (
            <>
              <div style={{ display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:aiGenerated?C.sagePale:C.cream,border:`1px solid ${aiGenerated?C.sageLight:C.parchment}`,borderRadius:10,marginBottom:18 }}>
                <span style={{ fontSize:16 }}>{aiGenerated?"🤖":"📋"}</span>
                <span style={{ fontFamily:F.body,fontSize:12,color:aiGenerated?C.sageDark:C.stone,fontWeight:500 }}>{aiGenerated?`AI-generated schedule for ${animal.name}`:`Suggested schedule for ${animal.species}s — add your Anthropic key for personalized AI schedules`}</span>
              </div>
              <p style={{ fontFamily:F.body,fontSize:13,color:C.stone,marginBottom:18,lineHeight:1.6 }}>Toggle reminders on or off, then add them all at once.</p>
              <div style={{ display:"grid",gap:8,marginBottom:22 }}>
                {suggestions.map(r => {
                  const t = getReminderType(r.type);
                  const on = selected[r.id] !== false;

                    <div key={r.id} onClick={() => setSelected(p=>({...p,[r.id]:!p[r.id]}))} style={{ display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,border:`1.5px solid ${on?t.color+"55":C.parchment}`,background:on?t.color+"0C":C.white,cursor:"pointer",transition:"all 0.15s" }}>
                      <div style={{ width:36,height:36,borderRadius:10,background:on?t.color+"20":C.cream,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0 }}>{t.icon}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontFamily:F.body,fontWeight:700,fontSize:14,color:on?C.dark:C.stone }}>{r.text}</div>
                        <div style={{ fontFamily:F.body,fontSize:11,color:C.pebble,marginTop:2 }}>{fmt(r.due)} · {r.recurrence}</div>

                      </div>
                      <div style={{ width:22,height:22,borderRadius:6,border:`2px solid ${on?t.color:C.parchment}`,background:on?t.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>

                  <Btn variant="primary" small disabled={!Object.values(selected).some(Boolean)} onClick={addSelected}>Add Selected</Btn>
                </div>
              </div>
            </>
          )}
        </Modal>
      );
    }

    // ── 4. AI Body Condition Score ────────────────────────────────────
    function BCSCheck({ animal, isPro, onUpgrade }) {
      const inputRef = useRef();
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);

      const BCS_MAX  = { Cattle:9, Horse:9, Goat:5, Sheep:5, Pig:5 };
      const BCS_IDEAL = { Cattle:"4–6", Horse:"4–6", Goat:"2.5–3.5", Sheep:"2.5–3.5", Pig:"3–3.5" };
      const maxScale  = BCS_MAX[animal.species]  || 5;
      const idealRange = BCS_IDEAL[animal.species] || "2.5–3.5";
      const scaleLabel = `1–${maxScale}`;

      // Robust parser — handles markdown, extra spaces, multi-line values
      const parse = (text, key) => {
        const re = new RegExp(`(?:^|\\n)\\s*\\**${key}\\**:?\\s*(.+?)(?=\\n\\s*\\**[A-Z_]+\\**:?|$)`, "si");
        const m = text.match(re);
        return m ? m[1].replace(/\*+/g, "").trim() : "";
      };

      const analyze = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setLoading(true); setResult(null); setError(null);
        const reader = new FileReader();
        reader.onload = async ev => {
          try {
            const dataUrl = ev.target.result;
            const mediaType = dataUrl.split(";")[0].split(":")[1] || "image/jpeg";
            const base64 = dataUrl.split(",")[1];

            const system = `You are a certified livestock body condition scoring expert. Assess the animal in the photo by examining spine prominence, rib visibility, hip bone protrusion, tail-head fat cover, and muscle mass. Always respond with real observations about what you see in the image.`;

            const msg = `Score this ${animal.breed || ""}${animal.breed ? " " : ""}${animal.species} using the ${scaleLabel} BCS scale. Examine the photo carefully and respond in EXACTLY this format — fill in real values, no brackets:

SCORE: 4
OUT_OF: ${maxScale}
STATUS: Ideal
ASSESSMENT: Ribs are palpable but not visually prominent, with good muscle coverage along the back and loin. Hip bones are rounded with adequate fat deposits and the spine is not prominent.
RECOMMENDATION: Maintain current feed ration and re-score in 4 weeks.
IDEAL_RANGE: ${idealRange}

Now do the same for the animal in the attached photo. Use the same format, replace all values with your real assessment.`;

            const text = await callAIWithImage(system, msg, base64, mediaType);

            // Detect template/placeholder response — means AI didn't receive or couldn't process the image
            const looksLikeTemplate = /\[1-\d\]|\[2 sentences\]|\[1 sentence\]|\[Underweight\|/.test(text);
            if (looksLikeTemplate || !text.trim()) {
              setError("Photo couldn't be analyzed. Please try a clear side-view photo in good lighting (JPEG or PNG works best).");
              setLoading(false);
              return;
            }

            const scoreRaw = parse(text, "SCORE");
            const scoreNum = parseFloat(scoreRaw);
            const status   = parse(text, "STATUS");
            const assessment = parse(text, "ASSESSMENT");
            const recommendation = parse(text, "RECOMMENDATION");
            const ideal = parse(text, "IDEAL_RANGE") || idealRange;

            if (!scoreRaw && !assessment) {
              // Fallback: show raw response so user sees something
              setResult({ raw: text, score: null });
            } else {
              setResult({ score: scoreNum || scoreRaw, outOf: maxScale, status, assessment, recommendation, ideal, raw: null });
            }
          } catch(err) {
            setError("Could not analyze photo. Please try again with a clear side-view photo.");
          }
          setLoading(false);
        };
        reader.readAsDataURL(file);
        e.target.value = "";
      };

      const statusColor = { Underweight: C.terracotta, Ideal: C.sage, Overweight: C.amber };
      const sColor = statusColor[result?.status] || C.sage;

      if (!isPro) return (
        <div style={{ background:C.cream,border:`1.5px dashed ${C.parchment}`,borderRadius:14,padding:"20px",textAlign:"center",marginTop:16 }}>
          <div style={{ fontSize:28,marginBottom:8 }}>📊</div>
          <div style={{ fontFamily:F.display,fontSize:16,color:C.dark,fontWeight:700,marginBottom:6 }}>AI Body Condition Score</div>
          <div style={{ fontFamily:F.body,fontSize:12,color:C.stone,marginBottom:14,lineHeight:1.55 }}>Upload a photo and AI rates {animal.name}'s body condition on the {scaleLabel} scale — the same metric vets use.</div>
          <Btn small variant="primary" onClick={onUpgrade}>Upgrade to Pro</Btn>
        </div>
      );

      return (
        <div style={{ marginTop:16 }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}>
            <div style={{ fontFamily:F.body,fontSize:11,color:C.stone,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700 }}>📊 AI Body Condition Score</div>
            <Btn small variant="outline" onClick={() => inputRef.current.click()} disabled={loading}>
              {loading ? "Analyzing…" : result ? "Re-analyze" : "Upload Photo"}
            </Btn>
          </div>
          <input ref={inputRef} type="file" accept="image/*" style={{ display:"none" }} onChange={analyze} />

          {loading && (
            <div style={{ textAlign:"center",padding:"20px 0",fontFamily:F.body,fontSize:13,color:C.stone }}>
              🔍 Examining photo…
            </div>
          )}

          {error && (
            <div style={{ fontFamily:F.body,fontSize:13,color:C.terracotta,padding:"12px 14px",background:C.terracotta+"10",borderRadius:10,lineHeight:1.5 }}>{error}</div>
          )}

          {result && result.raw && (
            <div style={{ background:C.cream,border:`1px solid ${C.parchment}`,borderRadius:12,padding:"14px 16px" }}>
              <div style={{ fontFamily:F.body,fontSize:11,color:C.stone,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8 }}>AI Analysis</div>
              <div style={{ fontFamily:F.body,fontSize:13,color:C.brown,lineHeight:1.7,whiteSpace:"pre-wrap" }}>{result.raw}</div>
            </div>
          )}

          {result && result.score !== null && !result.raw && (() => {
            const pct = typeof result.score === "number" ? (result.score / result.outOf) * 100 : null;
            return (
              <div style={{ background:`${sColor}10`,border:`1.5px solid ${sColor}44`,borderRadius:14,padding:"18px 18px 16px" }}>

                {/* Score header */}
                <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:16 }}>
                  <div style={{ textAlign:"center",flexShrink:0,minWidth:64 }}>
                    <div style={{ fontFamily:F.display,fontSize:38,fontWeight:800,color:sColor,lineHeight:1 }}>{result.score}</div>
                    <div style={{ fontFamily:F.body,fontSize:11,color:C.stone,fontWeight:700,marginTop:2 }}>out of {result.outOf}</div>
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6 }}>
                      <Badge color={sColor}>{result.status || "Assessed"}</Badge>
                      <span style={{ fontFamily:F.body,fontSize:11,color:C.stone }}>Ideal: {result.ideal}</span>
                    </div>
                    {pct !== null && (
                      <div style={{ height:8,background:C.parchment,borderRadius:100,overflow:"hidden" }}>
                        <div style={{ height:"100%",width:`${Math.min(100,pct)}%`,background:`linear-gradient(90deg,${sColor}99,${sColor})`,borderRadius:100,transition:"width 0.6s ease" }} />
                      </div>
                    )}
                    <div style={{ display:"flex",justifyContent:"space-between",fontFamily:F.body,fontSize:10,color:C.pebble,marginTop:3 }}>
                      <span>1</span><span style={{ color:C.sage,fontWeight:700 }}>Ideal</span><span>{result.outOf}</span>
                    </div>
                  </div>
                </div>

                {/* Assessment */}
                {result.assessment && (
                  <div style={{ fontFamily:F.body,fontSize:13,color:C.brown,lineHeight:1.7,marginBottom:10,paddingTop:10,borderTop:`1px solid ${sColor}22` }}>
                    {result.assessment}
                  </div>
                )}

                {/* Recommendation */}
                {result.recommendation && (
                  <div style={{ display:"flex",gap:8,alignItems:"flex-start",background:sColor+"18",borderRadius:8,padding:"10px 12px" }}>
                    <span style={{ flexShrink:0 }}>💡</span>
                    <div style={{ fontFamily:F.body,fontSize:12,color:C.dark,lineHeight:1.6 }}>{result.recommendation}</div>
                  </div>
                )}
              </div>
            );
          })()}

          {!result && !error && !loading && (
            <div style={{ fontFamily:F.body,fontSize:12,color:C.pebble,textAlign:"center",padding:"16px 0",lineHeight:1.6 }}>

      const [loading, setLoading] = useState(true);
      const [digest, setDigest] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => { if (isPro) generate(); else setLoading(false); }, []);

      const generate = async () => {
        const season = getSeason();
        const upcoming = animals.flatMap(a => (a.reminders||[]).filter(r => { const d=daysUntil(r.due); return d!==null&&d<=7&&d>=0; }).map(r=>`${a.name}: ${r.text} (${fmt(r.due)})`));
        const overdue  = animals.flatMap(a => (a.reminders||[]).filter(r => { const d=daysUntil(r.due); return d!==null&&d<0; }).map(r=>`${a.name}: ${r.text}`));
        const system = `You are the AI writer for PasturePal. Write warm, encouraging homestead farm journal digests.`;
        const msg = `Write a weekly homestead digest for this farm:
Animals: ${animals.map(a=>`${a.name} (${a.breed} ${a.species})`).join(", ")||"no animals yet"}
Season: ${season.name}
Overdue tasks: ${overdue.join(", ")||"none — all caught up!"}
This week's upcoming: ${upcoming.join(", ")||"nothing due this week"}
Write in warm farm-journal style, under 220 words. Include: a greeting with today's date, brief herd overview, this week's priorities from the list above, and one ${season.name.toLowerCase()} husbandry tip for their specific animals. Start with "Good morning, farmer!"`;
        try {
          setDigest(await callAI(system, msg, 400));
        } catch { setError(AI_ERROR_MSG); }
        setLoading(false);
      };

      const season = getSeason();

      if (!isPro) return (
        <Modal title="📰 Weekly Homestead Digest" onClose={onClose}>
          <ProGate icon="📰" description="A personalized weekly farm report — your herd status, this week's tasks, and a seasonal tip, written in farm-journal style every Monday." onUpgrade={onUpgrade} onClose={onClose} />
        </Modal>
      );

      return (
        <Modal title="📰 Weekly Homestead Digest" onClose={onClose}>
          {loading ? (
            <div style={{ textAlign:"center",padding:"40px 0" }}>
              <div style={{ display:"flex",justifyContent:"center",gap:8,marginBottom:16 }}>{[1,2,3].map(n=><div key={n} className={`pp-dot-${n}`} style={{width:10,height:10,borderRadius:"50%",background:C.sage}}/>)}</div>
              <div style={{ fontFamily:F.body,fontSize:14,color:C.stone }}>Writing your weekly digest…</div>
            </div>
          ) : (
            <>
              <div style={{ background:season.bg,border:`1.5px solid ${season.accent}33`,borderRadius:14,padding:"18px 20px",marginBottom:16 }}>
                <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:10 }}>
                  <span style={{ fontSize:18 }}>{season.emoji}</span>
